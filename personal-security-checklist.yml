- title: Ağlar
  slug: networks
  description: Ağ trafiğinizi korumak
  icon: network
  intro: >
    Bu bölüm, yönlendiricinizi yapılandırma ve VPN kurma dahil, cihazlarınızı internete güvenli
    bir şekilde nasıl bağlayacağınızı anlatır.
  checklist:
  - point: Bir VPN Kullanın
    priority: Essential
    details: >-
      Saygın, ücretli bir VPN kullanın. Bu, ziyaret ettiğiniz sitelerin gerçek IP'nizi kaydetmesini
      önlemeye, ISP'nizin toplayabileceği veri miktarını azaltmaya ve herkese açık WiFi'de korumayı
      artırmaya yardımcı olabilir.

  - point: Yönlendirici Parolanızı Değiştirin
    priority: Essential
    details: >-
      Yeni bir yönlendirici aldıktan sonra parolayı değiştirin. Varsayılan yönlendirici parolaları
      herkese açıktır, yani yakınlıktaki herkes bağlanabilir.

  - point: WPA2 ve Güçlü Bir Parola Kullanın
    priority: Essential
    details: >-
      WiFi'ye bağlanmak için farklı kimlik doğrulama protokolleri vardır. Şu anda en güvenli
      seçenekler WPA2 ve (daha yeni yönlendiricilerde) WPA3'tür.

  - point: Yönlendirici Yazılımını Güncel Tutun
    priority: Essential
    details: >-
      Üreticiler, güvenlik açıklarını düzelten, yeni standartlar uygulayan ve bazen özellikler
      ekleyen veya yönlendiricinizin performansını iyileştiren donanım yazılımı güncellemeleri
      yayınlar.

  - point: Ağ Genelinde Bir VPN Uygulayın
    priority: Optional
    details: >-
      VPN'inizi yönlendiricinizde, güvenlik duvarınızda veya ev sunucunuzda yapılandırırsanız,
      tüm cihazlardan gelen trafik, ayrı VPN uygulamalarına gerek kalmadan şifrelenir ve buradan
      yönlendirilir.

  - point: DNS Sızıntılarına Karşı Koruma Sağlayın
    priority: Optional
    details: >-
      Bir VPN kullanırken, yalnızca VPN sağlayıcınızın veya güvenli hizmetinizin DNS sunucusunu
      kullanmanız son derece önemlidir.

  - point: Güvenli Bir VPN Protokolü Kullanın
    priority: Optional
    details: >-
      OpenVPN ve WireGuard açık kaynaklı, hafif ve güvenli tünelleme protokolleridir. PPTP veya
      SSTP kullanmaktan kaçının.

  - point: Güvenli DNS
    priority: Optional
    details: >-
      Sizinle DNS çözümleyiciniz arasındaki verileri şifreleyen, DNS çözümlemesini HTTPS protokolü
      üzerinden gerçekleştiren DNS-over-HTTPS kullanın.

  - point: ISP'nizden Ücretsiz Yönlendiriciden Kaçının
    priority: Optional
    details: >-
      Genellikle Çin'de toplu olarak ucuza üretilirler, düzenli güvenlik güncellemesi almayan
      güvenli olmayan özel donanım yazılımına sahiptirler.

  - point: MAC Adreslerini Beyaz Listeye Ekleyin
    priority: Optional
    details: >-
      Yönlendirici ayarlarınızda MAC adreslerini beyaz listeye ekleyebilir, bilinmeyen cihazların
      kimlik bilgilerinizi bilseler bile ağınıza hemen bağlanmasını engelleyebilirsiniz.

  - point: Yönlendiricinin Yerel IP Adresini Değiştirin
    priority: Optional
    details: >-
      Web tarayıcınızdaki kötü amaçlı bir betiğin, bilinen güvenlik açığı olan yönlendiricilere
      yerel IP adreslerinden erişip onları kurcalayarak bir siteler arası betik çalıştırma
      güvenlik açığından yararlanması mümkündür.

  - point: SSID'de Kişisel Bilgi İfşa Etmeyin
    priority: Optional
    details: >-
      Sizi tanımlamayan, daire numaranızı/adresinizi içermeyen ve cihaz markasını/modelini
      belirtmeyen bir SSID seçerek ağ adınızı güncellemelisiniz.

  - point: Yönlendirici Listelerinden Çıkın
    priority: Optional
    details: >-
      WiFi SSID'leri taranır, kaydedilir ve ardından çeşitli web sitelerinde yayınlanır; bu bazıları
      için ciddi bir gizlilik endişesidir.

  - point: SSID'nizi Gizleyin
    priority: Optional
    details: >-
      Yönlendiricinizin Hizmet Kümesi Tanımlayıcısı (SSID) basitçe ağ adıdır. Görünmüyorsa, daha
      az kötüye kullanılabilir.

  - point: WPS'yi Devre Dışı Bırakın
    priority: Optional
    details: >-
      Wi-Fi Korumalı Kurulum, uzun bir WiFi parolası girmeden bağlanmak için daha kolay bir yöntem
      sağlar, ancak WPS bir dizi büyük güvenlik sorunu getirir.

  - point: UPnP'yi Devre Dışı Bırakın
    priority: Optional
    details: >-
      Evrensel Tak ve Çalıştır, uygulamaların yönlendiricinizde otomatik olarak bir portu
      yönlendirmesine izin verir, ancak uzun bir ciddi güvenlik sorunları geçmişine sahiptir.

  - point: Misafirler İçin Bir Misafir Ağı Kullanın
    priority: Optional
    details: >-
      Ziyaretçilere birincil WiFi ağınıza erişim vermeyin, çünkü bu, ağdaki diğer cihazlarla
      etkileşime girmelerini sağlar.

  - point: Yönlendiricinizin Varsayılan IP'sini Değiştirin
    priority: Optional
    details: >-
      Yönlendirici yönetici panelinizin varsayılan IP adresini değiştirmek, yerel IP adreslerini
      hedef alan kötü amaçlı betiklerin işini zorlaştıracaktır.

  - point: Yönlendiricinizdeki Kullanılmayan İşlemleri ve Hizmetleri Kapatın
    priority: Optional
    details: >-
      Telnet ve SSH gibi cihazlara komut satırı erişimi sağlayan hizmetler asla internete açık
      olmamalı ve gerçekten ihtiyaç duyulmadıkça yerel ağda da devre dışı bırakılmalıdır.

  - point: Açık Port Bulundurmayın
    priority: Optional
    details: >-
      Yönlendiricinizde ihtiyaç duyulmayan tüm açık portları kapatın. Açık portlar, bilgisayar
      korsanları için kolay bir giriş noktası sağlar.

  - point: Kullanılmayan Uzaktan Erişim Protokollerini Devre Dışı Bırakın
    priority: Optional
    details: >-
      PING, Telnet, SSH, UPnP ve HNAP gibi protokoller etkinleştirildiğinde, yönlendiricinizin
      dünyanın herhangi bir yerinden sorgulanmasına izin verirler.

  - point: Bulut Tabanlı Yönetimi Devre Dışı Bırakın
    priority: Optional
    details: >-
      Bir saldırganın erişim sağlaması durumunda önemli hasara neden olabileceğinden, yönlendiricinizin
      yönetici paneline azami özenle davranmalısınız.

  - point: Menzili Doğru Şekilde Yönetin
    priority: Optional
    details: >-
      Yönlendiricinizin menzilini mümkün olduğunca artırmak isteği yaygındır, ancak küçük bir
      dairede yaşıyorsanız, WiFi ağınız caddenin karşısından bile alınabildiğinde saldırı yüzeyiniz
      artar.

  - point: Tüm Trafiği [Tor](https://awesome-privacy.xyz/networking/mix-networks/tor) Üzerinden Yönlendirin
    priority: Advanced
    details: >-
      VPN'lerin zayıf yönleri vardır. Artırılmış güvenlik için, tüm internet trafiğinizi
      [Tor](https://awesome-privacy.xyz/networking/mix-networks/tor) ağı üzerinden yönlendirin.

  - point: Tüm Cihazlarda WiFi'yi Devre Dışı Bırakın
    priority: Advanced
    details: >-
      Güvenli bir WiFi ağına bağlanmak bile saldırı yüzeyinizi artırır. Ev WiFi'nizi devre dışı
      bırakın ve her cihazı Ethernet ile bağlayın.
  color: violet
  softwareLinks:
  - title: Sanal Özel Ağlar
    url: https://github.com/Lissy93/awesome-privacy#virtual-private-networks
  - title: Karışım Ağları (Mix Networks)
