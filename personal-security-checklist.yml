  slug: email
  description: Çevrimiçi hesaplarınıza açılan kapıyı korumak
  icon: email
  intro: >-
    İlk e-postanın gönderilmesinin üzerinden neredeyse 50 yıl geçti ve hâlâ günlük hayatımızın
    büyük bir parçası ve yakın gelecekte de olmaya devam edecek. Onlara ne kadar güvendiğimizi
    düşününce, bu altyapının ne kadar temelden güvensiz olduğu şaşırtıcı. E-posta ile ilgili
    dolandırıcılık [artmaya devam ediyor](https://www.csoonline.com/article/3247670/email/email-security-in-2018.html)
    ve temel önlemleri almazsanız risk altında olabilirsiniz.


    Bir bilgisayar korsanı e-postalarınıza erişim sağlarsa, bu (parola sıfırlamaları yoluyla)
    diğer hesaplarınızın da ele geçirilmesi için bir kapı açar, bu yüzden e-posta güvenliği dijital
    güvenliğiniz için son derece önemlidir.


    "Ücretsiz" e-posta hizmeti sunan büyük şirketlerin, kullanıcı gizliliğine saygı konusunda iyi
    bir itibarı yok: Gmail'in [3. taraflara tam erişim](https://www.wsj.com/articles/techs-dirty-secret-the-app-developers-sifting-through-your-gmail-1530544442)
    verdiği ve ayrıca [tüm satın alımlarınızı izlediği](https://www.cnbc.com/2019/05/17/google-gmail-tracks-purchase-history-how-to-delete-it.html)
    tespit edildi. Yahoo da [ABD gözetim kurumları için](http://news.trust.org/item/20161004170601-99f8c)
    e-postaları gerçek zamanlı olarak tararken yakalandı. Reklamcılara,
    "bağlamsal satın alma sinyallerini ve geçmiş satın alımları yakalayarak potansiyel müşterileri
    tanımlamak ve segmentlere ayırmak" için Yahoo ve AOL kullanıcılarının mesajlarına
    [erişim verildi](https://thenextweb.com/insider/2018/08/29/both-yahoo-and-aol-are-scanning-customer-emails-to-attract-advertisers).

  checklist:
  - point: Birden Fazla E-posta Adresine Sahip Olun
    priority: Essential
    details: >-
      Bültenler gibi önemsiz postalardan güvenlik açısından kritik iletişimler için farklı bir
      e-posta adresi kullanmayı düşünün. Bu bölümlendirme, bir veri ihlalinin neden olduğu hasar
      miktarını azaltabilir ve ele geçirilmiş bir hesabı kurtarmayı da kolaylaştırabilir.

  - point: E-posta Adresinizi Gizli Tutun
    priority: Essential
    details: >-
      Birincil e-postanızı herkese açık şekilde paylaşmayın, çünkü posta adresleri genellikle
      çoğu kimlik avı saldırısının başlangıç noktasıdır.

  - point: Hesabınızı Güvende Tutun
    priority: Essential
    details: >-
      Uzun ve benzersiz bir parola kullanın, 2FA'yı etkinleştirin ve giriş yaparken dikkatli olun.
      E-posta hesabınız, bir saldırgan için diğer tüm çevrimiçi hesaplarınıza kolay bir giriş
      noktası sağlar.

  - point: Uzak İçeriğin Otomatik Yüklenmesini Devre Dışı Bırakın
    priority: Essential
    details: >-
      E-posta mesajları, genellikle sunucudan otomatik olarak yüklenen görüntüler veya stil
      sayfaları gibi uzak içerik içerebilir. Bunu devre dışı bırakmalısınız, çünkü IP adresinizi
      ve cihaz bilgilerinizi ifşa eder ve genellikle izleme için kullanılır. Daha fazla bilgi
      için [bu makaleye](https://www.theverge.com/2019/7/3/20680903/email-pixel-trackers-how-to-stop-images-automatic-download) bakın.

  - point: Düz Metin Kullanın
    priority: Optional
    details: >-
      İnternette iki ana e-posta türü vardır: düz metin ve HTML. Birincisi gizlilik ve güvenlik
      açısından kesinlikle tercih edilir, çünkü HTML mesajları genellikle bağlantılarda ve satır
      içi görsellerde kullanım ve kişisel veri toplayabilen tanımlayıcılar içerir. Ayrıca posta
      istemcinizin HTML ayrıştırıcısını hedef alan çok sayıda uzaktan kod yürütme riski vardır;
      düz metin kullanıyorsanız bu istismar edilemez. Daha fazla bilgi ve posta sağlayıcınız için
      kurulum talimatları için [UsePlaintext.email](https://useplaintext.email/) adresine bakın.

  - point: E-posta Hesabınıza 3. Taraf Uygulamalar Bağlamayın
    priority: Optional
    details: >-
      Bir 3. taraf uygulamaya veya eklentiye gelen kutunuza tam erişim verirseniz, tüm e-postalarınıza
      ve içeriklerine fiilen sınırsız erişime sahip olurlar; bu da önemli güvenlik ve gizlilik
      riskleri oluşturur.

  - point: Hassas Verileri E-posta Yoluyla Paylaşmayın
    priority: Optional
    details: >-
      E-postalar çok kolay bir şekilde ele geçirilebilir. Ayrıca alıcınızın ortamının ne kadar
      güvenli olduğundan emin olamazsınız. Bu nedenle, şifrelenmedikçe e-postalar gizli bilgi
      alışverişi için güvenli sayılamaz.

  - point: Güvenli Bir Posta Sağlayıcısına Geçmeyi Düşünün
    priority: Optional
    details: >-
      [Forward Email](https://awesome-privacy.xyz/communication/encrypted-email/forward-email),
      [ProtonMail](https://awesome-privacy.xyz/communication/mail-forwarding/protonmail) ve
      [Tutanota](https://awesome-privacy.xyz/communication/encrypted-email/tuta) gibi güvenli ve
      itibarlı e-posta sağlayıcıları, uçtan uca şifrelemeye, tam gizliliğe ve daha güvenlik odaklı
      özelliklere olanak tanır. Tipik e-posta sağlayıcılarının aksine, tüm mesajlar şifrelendiği
      için posta kutunuz sizden başka kimse tarafından okunamaz.

  - point: Akıllı Anahtar Kullanın
    priority: Advanced
    details: >-
      OpenPGP, İleri Gizliliği (Forward Secrecy) desteklemez, yani sizin veya alıcının özel
      anahtarı çalınırsa, onunla şifrelenmiş tüm önceki mesajlar açığa çıkar. Bu nedenle özel
      anahtarlarınızı güvende tutmak için büyük özen göstermelisiniz. Bunu yapmanın bir yolu,
      mesajları imzalamak veya şifresini çözmek için bir USB Akıllı Anahtar kullanmaktır; bu,
      özel anahtarınızın USB cihazından hiç çıkmadan bunu yapmanıza olanak tanır.

  - point: Takma Ad/Anonim Yönlendirme Kullanın
    priority: Advanced
    details: >-
      E-posta takma adları, mesajların [herhangi bir şey]@benim-alanadım.com adresine gönderilmesine
      ve yine de birincil gelen kutunuza düşmesine izin verir. Bu, kaydolduğunuz her hizmet için
      farklı, benzersiz bir e-posta adresi kullanmanıza olanak tanır. Bu, spam almaya başlarsanız
      o takma adı engelleyebileceğiniz ve hangi şirketin e-posta adresinizi sızdırdığını
      belirleyebileceğiniz anlamına gelir.

  - point: Alt Adresleme (Subaddressing)
    priority: Optional
    details: >-
      Takma adlamaya bir alternatif, `+` sembolünden sonraki her şeyin posta iletimi sırasında
      atlandığı alt adresleme yöntemidir. Bu, e-posta adresinizi kimin paylaştığını/sızdırdığını
      takip etmenizi sağlar, ancak takma adlamanın aksine gerçek adresinizin ifşa edilmesine karşı
      koruma sağlamaz.

  - point: Özel Bir Alan Adı Kullanın
    priority: Advanced
    details: >-
      Özel bir alan adı kullanmak, posta sağlayıcınız tarafından atanan adrese bağımlı olmadığınız
      anlamına gelir. Böylece gelecekte kolayca sağlayıcı değiştirebilir ve bir hizmetin
      sonlandırılması konusunda endişelenmenize gerek kalmaz.

  - point: Yedekleme İçin Bir İstemciyle Senkronize Edin
    priority: Advanced
    details: >-
      Planlanmamış bir olay (kesinti veya hesap kilidi gibi) sırasında e-postalarınıza geçici veya
      kalıcı erişimi kaybetmemek için, Thunderbird birden fazla hesaptan mesajları IMAP üzerinden
      senkronize edebilir/yedekleyebilir ve birincil cihazınızda yerel olarak saklayabilir.

  - point: E-posta İmzalarına Dikkat Edin
    priority: Advanced
    details: >-
      Mesajınızın alıcısının ne kadar güvenli bir e-posta ortamına sahip olduğunu bilemezsiniz.
      Mesajları otomatik olarak tarayan ve e-posta imzalarına dayanarak ayrıntılı bir iletişim
      bilgisi veritabanı oluşturan birçok uzantı vardır.

  - point: Otomatik Yanıtlara Dikkat Edin
    priority: Advanced
    details: >-
      Ofis dışı otomatik yanıtlar, insanları yanıt vermede gecikme olacağı konusunda bilgilendirmek
      için çok kullanışlıdır, ancak çoğu zaman insanlar sosyal mühendislik ve hedefli saldırılarda
      kullanılabilecek fazla bilgi ifşa eder.

  - point: Doğru Posta Protokolünü Seçin
    priority: Advanced
    details: >-
      Eski protokolleri kullanmayın (IMAPv4 veya POPv3'ün altındaki), her ikisi de bilinen güvenlik
      açıklarına ve eski güvenliğe sahiptir.

  - point: Kendi Sunucunuzu Barındırma (Self-Hosting)
    priority: Advanced
    details: >-
      Kendi posta sunucunuzu barındırmak, gelişmiş olmayan kullanıcılar için önerilmez, çünkü onu
      doğru şekilde güvence altına almak kritik olmakla birlikte güçlü ağ bilgisi gerektirir.

  - point: Her Zaman TLS Portlarını Kullanın
    priority: Advanced
    details: >-
      POP3, IMAP ve SMTP için standart TCP/IP portları olarak SSL seçenekleri vardır. Kullanımı
      kolaydır ve yaygın olarak desteklenir, bu yüzden her zaman düz metin e-posta portları yerine
      kullanılmalıdır.

  - point: DNS Kullanılabilirliği
    priority: Advanced
    details: >-
      Kendi barındırılan posta sunucuları için, DNS sorunlarının kullanılabilirliği etkilemesini
      önlemek amacıyla — birincil MX kaydı başarısız olduğunda yedeklilik için en az 2 MX kaydı,
      ikincil ve üçüncül MX kayıtlarıyla birlikte kullanın.

  - point: DDoS ve Kaba Kuvvet Saldırılarını Önleyin
    priority: Advanced
    details: >-
      Kendi barındırılan posta sunucuları için (özellikle SMTP), bot saldırı girişimlerinin
      etkisini azaltmak için eş zamanlı bağlantı sayınızı ve maksimum bağlantı oranınızı sınırlayın.

  - point: IP Kara Listesi Tutun
    priority: Advanced
    details: >-
      Kendi barındırılan posta sunucuları için, güncel bir yerel IP kara listesi ve kötü amaçlı
      hiperbağlantıları filtrelemek için bir spam URI gerçek zamanlı engelleme listesi tutarak
      spam filtrelerini iyileştirebilir ve güvenliği sağlamlaştırabilirsiniz.
  color: teal
  softwareLinks:
    - title: Güvenli E-posta Sağlayıcıları
      url: https://github.com/Lissy93/awesome-privacy#encrypted-email
    - title: Posta Yönlendirme
      url: https://github.com/Lissy93/awesome-privacy#anonymous-mail-forwarding
    - title: Önceden Yapılandırılmış Posta Sunucuları
      url: https://github.com/Lissy93/awesome-privacy#pre-configured-mail-servers
    - title: E-posta İstemcileri
      url: https://github.com/Lissy93/awesome-privacy#email-clients

- title: Mesajlaşma
  slug: messaging
  description: İletişiminizi özel ve güvenli tutmak
  icon: messaging
  intro: ''
  checklist:
  - point: Sadece Tam Uçtan Uca Şifrelenmiş Mesajlaşma Uygulamaları Kullanın
    priority: Essential
    details: >-
      Uçtan uca şifreleme, mesajların cihazınızda şifrelendiği ve amaçlanan alıcıya ulaşana kadar
      şifresinin çözülmediği bir iletişim sistemidir. Bu, trafiği ele geçiren herhangi bir aktörün
      mesaj içeriğini okuyamamasını sağlar, verilerin depolandığı merkezi sunuculara erişimi olan
      hiç kimse de okuyamaz.

  - point: Yalnızca Açık Kaynaklı Mesajlaşma Platformlarını Kullanın
    priority: Essential
    details: >-
      Kod açık kaynaklıysa, herhangi bir arka kapı, güvenlik açığı veya başka güvenlik sorunu
      olmadığından emin olmak için bunu yapmaya nitelikli herkes tarafından bağımsız olarak
      incelenebilir ve denetlenebilir.

  - point: "\"Güvenilir\" Bir Mesajlaşma Platformu Kullanın"
    priority: Essential
    details: >-
      Şifreli bir mesajlaşma uygulaması seçerken, tamamen açık kaynaklı, kararlı, aktif olarak
      bakımı yapılan ve ideal olarak saygın geliştiriciler tarafından desteklenen bir uygulama
      olduğundan emin olun.

  - point: Güvenlik Ayarlarını Kontrol Edin
    priority: Essential
    details: >-
      Kişi doğrulama, güvenlik bildirimleri ve şifreleme dahil güvenlik ayarlarını etkinleştirin.
      Okundu bilgisi, en son çevrimiçi olma zamanı ve yazıyor bildirimi gibi isteğe bağlı,
      güvenlik dışı özellikleri devre dışı bırakın.

  - point: Alıcılarınızın Ortamının Güvenli Olduğundan Emin Olun
    priority: Essential
    details: >-
      Görüşmeniz ancak en zayıf halka kadar güvenli olabilir. Genellikle bir iletişim kanalına
      sızmanın en kolay yolu, en az korumaya sahip kişiyi veya düğümü hedef almaktır.

  - point: Bulut Hizmetlerini Devre Dışı Bırakın
    priority: Essential
    details: >-
      Bazı mobil mesajlaşma uygulamaları bir web veya masaüstü yardımcı uygulaması sunar. Bu yalnızca
      saldırı yüzeyini artırmakla kalmaz, aynı zamanda çeşitli kritik güvenlik sorunlarıyla
      ilişkilendirilmiştir, bu yüzden mümkünse kullanılmamalıdır.

  - point: Grup Sohbetlerini Güvenli Tutun
    priority: Essential
    details: >-
      Bir grupta katılımcı sayısı arttıkça, saldırı yüzeyi de arttığından, ele geçirilme riski
      üstel olarak artar. Tüm katılımcıların meşru olduğunu periyodik olarak kontrol edin.

  - point: İletişim İçin Güvenli Bir Ortam Oluşturun
    priority: Essential
    details: >-
      Dijital iletişiminizin izlenebileceği veya ele geçirilebileceği çeşitli aşamalar vardır. Buna
      şunlar dahildir: sizin veya katılımcılarınızın cihazı, ISP'niz, ulusal ağ geçidi veya devlet
      kayıt tutma, mesajlaşma sağlayıcısı, sunucular.

  - point: Bir İletişim Planı Üzerinde Anlaşın
    priority: Optional
    details: >-
      Belirli durumlarda, bir iletişim planı yapmaya değer olabilir. Bu, birbirinizle güvenli bir
      şekilde iletişime geçmenin birincil ve yedek yöntemlerini içermelidir.

  - point: Medyadan Meta Verileri Kaldırın
    priority: Optional
    details: >-
      Meta veri, "Veri Hakkında Veri" ya da bir dosyaya veya işleme eklenen ek bilgidir. Bir
      fotoğraf, ses kaydı, video veya belge gönderdiğinizde, amaçladığınızdan daha fazlasını
      ifşa ediyor olabilirsiniz.

  - point: URL'leri Etkisiz Hale Getirin (Defang)
    priority: Optional
    details: >-
      Çeşitli hizmetler aracılığıyla bağlantı göndermek, istemeden kişisel bilgilerinizi ifşa
      edebilir. Bunun nedeni, bir küçük resim veya önizleme oluşturulduğunda bunun istemci
      tarafında gerçekleşmesidir.

  - point: Alıcınızı Doğrulayın
    priority: Optional
    details: >-
      Her zaman amaçlanan alıcıyla konuştuğunuzdan ve onların ele geçirilmediğinden emin olun. Bunu
      yapmanın bir yöntemi, kişi doğrulamayı destekleyen bir uygulama kullanmaktır.

  - point: Geçici (Ephemeral) Mesajları Etkinleştirin
    priority: Optional
    details: >-
      Kendini imha eden mesajlar, mesajlarınızın belirli bir süre sonra otomatik olarak silinmesini
      sağlayan bir özelliktir. Bu, cihazınız kaybolur, çalınır veya el konulursa, bir saldırganın
      yalnızca en son iletişimlere erişebileceği anlamına gelir.

  - point: SMS'ten Kaçının
    priority: Optional
    details: >-
      SMS kullanışlı olabilir, ancak güvenli değildir. Ele geçirme, sim değiştirme, manipülasyon
      ve kötü amaçlı yazılım gibi tehditlere karşı savunmasızdır.

  - point: İzleyicilere Dikkat Edin
    priority: Optional
    details: >-
      İzleyicileri olan mesajlaşma uygulamalarına karşı dikkatli olun, çünkü topladıkları ayrıntılı
      kullanım istatistikleri genellikle çok müdahalecidir ve bazen paylaşmayı amaçlamadığınız
      kimliğinizi ve kişisel bilgilerinizi ortaya çıkarabilir.

  - point: Yargı Yetkisini (Jurisdiction) Düşünün
    priority: Advanced
    details: >-
      Kuruluşun bulunduğu ve verilerin barındırıldığı yargı yetkileri de dikkate alınmalıdır.

  - point: Anonim Bir Platform Kullanın
    priority: Advanced
    details: >-
      Hedef alınabileceğinizi düşünüyorsanız, kaydolmak veya kullanmak için telefon numarası veya
      başka herhangi bir kişisel olarak tanımlanabilir bilgi gerektirmeyen anonim bir mesajlaşma
      platformunu tercih etmelisiniz.

  - point: İleri Gizliliğin (Forward Secrecy) Desteklendiğinden Emin Olun
    priority: Advanced
    details: >-
      İleri gizliliği uygulayan bir platformu tercih edin. Bu, uygulamanızın her mesaj için yeni
      bir şifreleme anahtarı oluşturduğu anlamına gelir.

  - point: Merkezi Olmayan Bir Platform Düşünün
    priority: Advanced
    details: >-
      Tüm veriler merkezi bir sağlayıcı üzerinden akıyorsa, verilerinizi ve meta verilerinizi
      onlara güvenmeniz gerekir. Çalışan sistemin arka kapılar olmadan orijinal olduğunu
      doğrulayamazsınız.
  softwareLinks:
    - title: Güvenli Mesajlaşma Uygulamaları
      url: https://github.com/Lissy93/awesome-privacy#encrypted-messaging
    - title: P2P Mesajlaşma Platformları
      url: https://github.com/Lissy93/awesome-privacy#p2p-messaging
  color: cyan

- title: Sosyal Medya
  slug: social-media
  description: Çevrimiçi topluluk kullanımıyla ilişkili riskleri en aza indirmek
  icon: social
  intro: >
    Çevrimiçi topluluklar internetin icadından beri var oldu ve dünyanın her yerinden insanlara
    bağlantı kurma, iletişim kurma ve paylaşma fırsatı veriyor. Bu ağlar sosyal etkileşimi teşvik
    etmenin ve insanları bir araya getirmenin harika bir yolu olsa da, karanlık bir tarafları da var
    - [Sosyal Ağ Hizmetleriyle İlgili Gizlilik Endişeleri](https://en.wikipedia.org/wiki/Privacy_concerns_with_social_networking_services)
    ile ilgili bazı ciddi endişeler var ve bu sosyal ağ siteleri özel şirketlere ait ve paralarını
    bireyler hakkında veri toplayıp bu veriyi genellikle 3. taraf reklamcılara satarak kazanıyorlar.

    Hesabınızı güvence altına alın, gizlilik ayarlarınızı kilitleyin, ancak bunu yaptıktan sonra
    bile, kasıtlı ve kasıtsız olarak yüklenen tüm verilerin fiilen herkese açık olduğunu bilin.
    Mümkünse, geleneksel sosyal medya ağlarını kullanmaktan kaçının.
  checklist:
  - point: Hesabınızı Güvence Altına Alın
    priority: Essential
    details: >-
      Sosyal medya profilleri çok sık çalınır veya ele geçirilir. Hesabınızı korumak için: benzersiz
      ve güçlü bir parola kullanın ve 2 faktörlü kimlik doğrulamayı etkinleştirin.

  - point: Gizlilik Ayarlarını Kontrol Edin
    priority: Essential
    details: >-
      Çoğu sosyal ağ, gizlilik ayarlarınızı kontrol etmenize izin verir. Şu anda hangi verileri
      kime ifşa ettiğinizden rahat olduğunuzdan emin olun.

  - point: Tüm Etkileşimleri Herkese Açıkmış Gibi Düşünün
    priority: Essential
    details: >-
      Birçok sosyal ağda hâlâ bir kullanıcının 'özel' içeriğini görüntülemenin sayısız yöntemi
      vardır. Bu nedenle, herhangi bir şey yüklemeden, paylaşmadan veya yorum yapmadan önce şunu
      düşünün: "Bu tamamen herkese açık olsa umursar mıydım?"

  - point: Tüm Etkileşimleri Kalıcıymış Gibi Düşünün
    priority: Essential
    details: >-
      Hemen hemen her gönderi, yorum, fotoğraf vb. bu verileri arşivleyen ve neredeyse sonsuza
      kadar dizinlenebilir ve herkese açık hale getiren sayısız 3. taraf hizmet tarafından sürekli
      yedeklenir.

  - point: Fazla Bilgi Vermeyin
    priority: Essential
    details: >-
      Profil bilgisi, bilgisayar korsanları için bir altın madeni oluşturur; kimlik avı dolandırıcılıklarını
      kişiselleştirmelerine yardımcı olan türden veriler. Çok fazla ayrıntı paylaşmaktan kaçının
      (doğum tarihi, memleket, okul vb.).

  - point: Ne Yüklediğinize Dikkat Edin
    priority: Essential
    details: >-
      Durum güncellemeleri, yorumlar, check-in'ler ve medya, amaçladığınızdan çok daha fazlasını
      istemeden ifşa edebilir. Bu özellikle arka planda bir şeyler gösterebilecek fotoğraf ve
      videolar için geçerlidir.

  - point: E-posta veya Telefon Numarasını Paylaşmayın
    priority: Essential
    details: >-
      Gerçek e-posta adresinizi veya cep telefonu numaranızı paylaşmak, bilgisayar korsanlarına,
      trollere ve spam gönderenlere sizinle ilgili kullanabilecekleri daha fazla cephane verir ve
      ayrıca ayrı takma adların, profillerin veya veri noktalarının bağlanmasına izin verebilir.

  - point: Gereksiz İzinler Vermeyin
    priority: Essential
    details: >-
      Varsayılan olarak popüler sosyal ağ uygulamalarının çoğu, kişilerinize, çağrı geçmişinize,
      konumunuza, mesajlaşma geçmişinize vb. erişim izni ister. Bu erişime ihtiyaçları yoksa,
      izin vermeyin.

  - point: 3. Taraf Entegrasyonlarına Dikkat Edin
    priority: Essential
    details: >-
      Bir Sosyal Ağ girişi kullanarak hesaplara kaydolmaktan kaçının, artık kullanmadığınız sosyal
      uygulamalara erişimi iptal edin.

  - point: Hala Sahadayken Coğrafi Veri Yayınlamaktan Kaçının
    priority: Essential
    details: >-
      Bir konumu ortaya çıkaran içerik paylaşmayı planlıyorsanız, o yeri terk edene kadar bekleyin.
      Bu, bir geziye çıktığınızda, bir restoranda, kampüste, otel/tatil köyünde, umumi bir binada
      veya havaalanındayken özellikle önemlidir.

  - point: Yüklemeden Önce Medyadan Meta Verileri Kaldırın
    priority: Optional
    details: >-
      Çoğu akıllı telefon ve bazı kameralar her fotoğrafa otomatik olarak kapsamlı bir ek veri
      seti (EXIF verisi denir) ekler. Yüklemeden önce bu verileri kaldırın.

  - point: Görüntü Gizleme (Cloaking) Uygulayın
    priority: Advanced
    details: >-
      Fawkes gibi araçlar, fotoğraflardaki yüzlerin yapısını insanlar tarafından fark edilemeyecek
      ama yüz tanıma sistemlerinin belirli bir yüzü tanımasını engelleyecek kadar hafifçe
      değiştirmek için kullanılabilir.

  - point: Ev Çevresinde GPS Sahteciliği Yapmayı Düşünün
    priority: Advanced
    details: >-
      Siz sosyal medyayı hiç kullanmasanız bile, her zaman sizin kadar dikkatli olmayan ve
      konumunuzu ifşa edebilecek başkaları olacaktır.

  - point: Yanlış Bilgi Kullanmayı Düşünün
    priority: Advanced
    details: >-
      Sadece okumak istiyorsanız ve fazla paylaşım yapmayı düşünmüyorsanız — bir takma isim ve
      sahte iletişim bilgileri kullanmayı düşünün.

  - point: Hiç Sosyal Medya Hesabınız Olmasın
    priority: Advanced
    details: >-
      Sosyal medya temelde gizli değildir, bu yüzden maksimum çevrimiçi güvenlik ve gizlilik için,
      herhangi bir ana akım sosyal ağı kullanmaktan kaçının.

  softwareLinks:
