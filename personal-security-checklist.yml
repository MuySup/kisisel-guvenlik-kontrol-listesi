- title: İnsan Faktörü
  slug: human-aspect
  description: Sosyal mühendislik güvenlik risklerinden kaçınmak
  icon: human
  intro: >-
    Birçok veri ihlali, hack ve saldırı insan hatasından kaynaklanır. Aşağıdaki liste, bunun
    başınıza gelme riskini azaltmak için atmanız gereken adımları içerir. Birçoğu sağduyu
    gerektirir, ancak yine de not etmeye değer.

  checklist:
  - point: Alıcıları Doğrulayın
    priority: Essential
    details: >-
      E-postalar kolayca sahtelenebilir. Özellikle hassas eylemler için gönderenin gerçekliğini
      doğrulayın ve e-postalardaki bağlantılara tıklamak yerine URL'leri manuel olarak girmeyi
      tercih edin.

  - point: Açılır Pencere Bildirimlerinize Güvenmeyin
    priority: Essential
    details: >-
      Sahte açılır pencereler kötü niyetli aktörler tarafından kullanılabilir. Bir açılır
      pencerede herhangi bir bilgi girmeden önce her zaman URL'yi kontrol edin.

  - point: Cihazınızı Asla Gözetimsiz Bırakmayın
    priority: Essential
    details: >-
      Gözetimsiz cihazlar, güçlü parolalar olsa bile ele geçirilebilir. Kayıp cihazlar için
      şifreleme ve Telefonumu Bul gibi uzaktan silme özelliklerini kullanın.

  - point: Camfecting'i Önleyin
    priority: Essential
    details: >-
      Web kamerası kapakları ve mikrofon engelleyiciler kullanarak camfecting'e karşı korunun.
      Kullanılmadığında veya hassas konular konuşulurken ev asistanlarını sessize alın.

  - point: Omuz Üzerinden Bakanlara (Shoulder Surfer) Karşı Korunun
    priority: Essential
    details: >-
      Umumi alanlarda başkalarının ekranınızı okumasını önlemek için dizüstü bilgisayarlarda ve
      cep telefonlarında gizlilik ekranları kullanın.

  - point: Kimlik Avı Saldırıları Hakkında Kendinizi Eğitin
    priority: Essential
    details: >-
      Kimlik avı girişimlerine karşı dikkatli olun. URL'leri, alınan mesajların bağlamını
      doğrulayın ve 2FA kullanmak, parolaları tekrar kullanmamak gibi iyi güvenlik uygulamalarını
      benimseyin.

  - point: Stalkerware'e Dikkat Edin
    priority: Essential
    details: >-
      Tanıdıklar tarafından casusluk için yüklenen stalkerware'in farkında olun. Olağandışı
      pil kullanımı gibi işaretlere dikkat edin ve şüpheleniyorsanız fabrika ayarlarına sıfırlama
      yapın.

  - point: Güvenilir Kaynaklardan Saygın Yazılım Yükleyin
    priority: Essential
    details: >-
      Yalnızca meşru kaynaklardan yazılım indirin ve yüklemeden önce dosyaları
      [Virus Total](https://awesome-privacy.xyz/security-tools/online-tools/virus-total) gibi
      araçlarla kontrol edin.

  - point: Kişisel Verileri Güvenli Şekilde Saklayın
    priority: Essential
    details: >-
      Cihazlardaki veya buluttaki tüm kişisel verilerin yetkisiz erişime karşı şifreli olduğundan
      emin olun.

  - point: Belgelerdeki Kişisel Bilgileri Gizleyin
    priority: Essential
    details: >-
      Belgeleri paylaşırken, bilgi sızıntısını önlemek için kişisel ayrıntıları opak dikdörtgenlerle
      gizleyin.

  - point: Bir Sitenin Sadece `HTTPS` Olduğu İçin Güvenli Olduğunu Varsaymayın
    priority: Essential
    details: >-
      HTTPS bir web sitesinin meşruiyetini garanti etmez. URL'leri doğrulayın ve kişisel
      verilerle ilgili dikkatli olun.

  - point: Çevrimiçi Ödeme Yaparken Sanal Kartlar Kullanın
    priority: Optional
    details: >-
      Bankacılık bilgilerinizi korumak ve işlem risklerini sınırlamak için çevrimiçi ödemelerde
      sanal kartlar kullanın.

  - point: Uygulama İzinlerini Gözden Geçirin
    priority: Optional
    details: >-
      Hassas cihaz özelliklerine gereksiz erişim olmadığından emin olmak için uygulama izinlerini
      düzenli olarak gözden geçirin ve yönetin.

  - point: Herkese Açık Listelerden Çıkın
    priority: Optional
    details: >-
      İstenmeyen iletişimleri ve olası riskleri azaltmak için kendinizi herkese açık veritabanlarından
      ve pazarlama listelerinden çıkarın.

  - point: Çıkış Yaparken Asla Ek Kişisel Bilgi (PII) Vermeyin
    priority: Optional
    details: >-
      Veri hizmetlerinden çıkarken, daha fazla veri toplanmasını önlemek için ek kişisel bilgi
      vermeyin.

  - point: Veri Paylaşımından Çıkın
    priority: Optional
    details: >-
      Birçok uygulama ve hizmet varsayılan olarak veri paylaşımı ayarlarına sahiptir. Verilerinizin
      3. taraflarla paylaşılmasını önlemek için bundan çıkın.

  - point: Sosyal Medya Gizliliğini Gözden Geçirin ve Güncelleyin
    priority: Optional
    details: >-
      Gizlilik ayarlarınızı etkileyebilecek sık koşul güncellemeleri nedeniyle sosyal medya
      ayarlarınızı düzenli olarak kontrol edin ve güncelleyin.

  - point: Bölümlendirin
    priority: Advanced
    details: >-
      Bir ihlal durumunda veri ifşasını sınırlamak için dijital etkinliğinizin farklı alanlarını
      birbirinden ayrı tutun.

  - point: WhoIs Gizlilik Koruması
    priority: Advanced
    details: >-
      Kişisel bilgilerinizi herkese açık aramalardan korumak için alan adı kayıtlarında WhoIs
      Gizlilik Koruması kullanın.

  - point: Bir Yönlendirme Adresi Kullanın
    priority: Advanced
    details: >-
      Şirketlerin gerçek adresinizi bilmesini önlemek, ek bir gizlilik koruması katmanı eklemek
      için posta amacıyla bir Posta Kutusu veya yönlendirme adresi kullanın.

  - point: Anonim Ödeme Yöntemleri Kullanın
    priority: Advanced
    details: >-
      Çevrimiçi olarak tanımlanabilir bilgi girmekten kaçınmak için kripto paralar gibi anonim
      ödeme yöntemlerini tercih edin.

  color: indigo

- title: Fiziksel Güvenlik
  slug: physical-security
  description: Gerçek dünyadaki güvenlik olaylarını önlemek için önlemler almak
  icon: physical
  intro: >-
    Kamu kayıtları genellikle hassas kişisel verileri içerir (tam ad, doğum tarihi, telefon
    numarası, e-posta, adres, etnik köken vb.) ve bir dizi kaynaktan toplanır (nüfus sayımı
    kayıtları, doğum/ölüm/evlilik belgeleri, seçmen kayıtları, pazarlama bilgileri, müşteri
    veritabanları, motorlu taşıt kayıtları, profesyonel/işletme lisansları ve tüm mahkeme
    dosyalarının tüm ayrıntıları). Bu hassas kişisel bilgilere
    [erişmek kolay ve yasaldır](https://www.consumerreports.org/consumerist/its-creepy-but-not-illegal-for-this-website-to-provide-all-your-public-info-to-anyone/),
    bu da bazı [ciddi gizlilik endişelerini](https://privacyrights.org/resources/public-records-internet-privacy-dilemma)
    beraberinde getirir (kimlik hırsızlığı, kişisel güvenlik riskleri/sapıklar, itibar
    yıkımı, dosya toplumu)


    CCTV, şirketlerin, bireylerin ve hükümetin hareketlerinizi izlediği başlıca yollardan
    biridir. Londra, İngiltere'de ortalama bir kişi günde yaklaşık 500 kez kamerada yakalanır.
    Bu ağ büyümeye devam ediyor ve dünyanın birçok şehrinde yüz tanıma devreye giriyor, bu da
    devletin görüntüdeki sakinlerin kimliğini gerçek zamanlı olarak bilebileceği anlamına geliyor.

    Güçlü kimlik doğrulama, şifreli cihazlar, yamalı yazılım ve anonim web taraması, biri
    sizi, cihazlarınızı ve verilerinizi fiziksel olarak ele geçirebiliyorsa çok az işe
    yarayabilir. Bu bölüm, fiziksel güvenlik için bazı temel yöntemleri özetlemektedir

  checklist:
  - point: Hassas Belgeleri İmha Edin
    priority: Essential
    details: |
      Kimlik hırsızlığına karşı korunmak ve gizliliği korumak için hassas belgeleri elden
      çıkarmadan önce parçalayın veya karartın.

  - point: Kamu Kayıtlarından Çıkın
    priority: Essential
    details: |
      Michael Bazzell'in Kişisel Veri Kaldırma El Kitabı gibi kılavuzları kullanarak kişisel
      bilgileri gösteren listelerden çıkmak için kişi arama web sitelerine başvurun.

  - point: Belgeleri Filigranla İşaretleyin
    priority: Essential
    details: |
      Bir ihlalin kaynağını izlemek için kişisel belgelerin dijital kopyalarına alıcının adı
      ve tarihini içeren bir filigran ekleyin.

  - point: Gelen Aramalarda Bilgi Vermeyin
    priority: Essential
    details: |
      Kişisel verileri yalnızca kendi başlattığınız aramalarda paylaşın ve alıcının telefon
      numarasını doğrulayın.

  - point: Tetikte Olun
    priority: Essential
    details: Çevrenizin farkında olun ve yeni ortamlardaki olası riskleri değerlendirin.

  - point: Çevreyi Güvence Altına Alın
    priority: Essential
    details: Kişisel bilgi cihazlarını depolayan yerlerin fiziksel güvenliğini sağlayın, dış erişimi asgariye indirin ve izinsiz giriş tespit sistemleri kullanın.

  - point: Cihazları Fiziksel Olarak Güvence Altına Alın
    priority: Essential
    details: Cihazlar için Kensington kilitleri, web kamerası kapakları ve gizlilik ekranları gibi fiziksel güvenlik önlemleri kullanın.

  - point: Cihazları Doğrudan Görüş Alanının Dışında Tutun
    priority: Essential
    details: Lazerler ve hırsızlık kaynaklı riskleri azaltmak için cihazların dışarıdan görünmesini önleyin.

  - point: PIN'inizi Koruyun
    priority: Essential
    details: PIN girişinizi çevredekilerden ve kameralardan gizleyin ve kullanımdan sonra dokunmatik ekranları temizleyin.

  - point: Kart Kopyalayıcı (Skimmer) Kontrolü Yapın
    priority: Essential
    details: Kullanmadan önce ATM'leri ve umumi cihazları kart kopyalama cihazları ve kurcalama işaretleri açısından inceleyin.

  - point: Ev Adresinizi Koruyun
    priority: Optional
    details: Ev adresinizi korumak için alternatif konumlar, yönlendirme adresleri ve anonim ödeme yöntemleri kullanın.

  - point: Biyometri Yerine PIN Kullanın
    priority: Advanced
    details: Cihazları açmaya yönelik yasal zorlama olabilecek durumlarda cihaz güvenliği için biyometri yerine PIN'leri tercih edin.

  - point: CCTV'ye Maruziyeti Azaltın
    priority: Advanced
    details: Gözetimden kaçınmak için kılık değiştirin ve daha az kamera bulunan güzergahları seçin.

  - point: Yüz Tanıma Karşıtı Giysiler
    priority: Advanced
    details: Yüz tanıma teknolojisini kandıran desenlere sahip giysiler giyin.

  - point: Gece Görüşe Maruziyeti Azaltın
    priority: Advanced
    details: Gece görüş kameralarını engellemek için IR ışık kaynakları veya yansıtıcı gözlükler kullanın.

  - point: DNA'nızı Koruyun
    priority: Advanced
    details: Soy araştırma web siteleriyle DNA paylaşmaktan kaçının ve DNA izleri bırakma konusunda dikkatli olun.

  color: lime
