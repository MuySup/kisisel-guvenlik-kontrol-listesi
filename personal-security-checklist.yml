- title: Kişisel Bilgisayarlar
  slug: personal-computers
  description: PC'nizin işletim sistemini, verilerini ve etkinliğini güvence altına almak
  icon: computer
  intro: >
    Windows ve OS X kullanımı kolay ve kullanışlı olsa da, ikisi de güvenlikten uzaktır. İşletim
    sisteminiz donanım ile uygulamalarınız arasındaki arayüzü sağlar, bu yüzden ele geçirilirse
    ciddi etkileri olabilir.
  checklist:
  - point: Sisteminizi Güncel Tutun
    priority: Essential
    details: >-
      Sistem güncellemeleri, güvenlik sorunları için düzeltmeler/yamalar içerir, performansı
      iyileştirir ve bazen yeni özellikler ekler. İstendiğinde yeni güncellemeleri yükleyin.

  - point: Cihazınızı Şifreleyin
    priority: Essential
    details: >-
      Tam disk şifrelemeyi etkinleştirmek için Windows'ta BitLocker, MacOS'ta FileVault veya
      Linux'ta LUKS kullanın. Bu, bilgisayarınız kaybolur veya çalınırsa yetkisiz erişimi önler.

  - point: Önemli Verileri Yedekleyin
    priority: Essential
    details: >-
      Şifreli yedeklemeler tutmak, fidye yazılımı, hırsızlık veya hasar nedeniyle veri kaybını
      önler. Bulut dosyaları için
      [Cryptomator](https://awesome-privacy.xyz/security-tools/mobile-apps/cryptomator) veya
      USB sürücüler için
      [VeraCrypt](https://awesome-privacy.xyz/essentials/file-encryption/veracrypt) kullanmayı
      düşünün.

  - point: Bilgisayarınıza USB Cihazları Takarken Dikkatli Olun
    priority: Essential
    details: >-
      USB cihazları ciddi tehditler oluşturabilir. USB cihazlarını güvenli bir şekilde kontrol
      etmek için CIRCLean ile bir USB temizleyici oluşturmayı düşünün.

  - point: Boşta Kaldığında Ekran Kilidini Etkinleştirin
    priority: Essential
    details: >-
      Uzaktayken bilgisayarınızı kilitleyin ve ekran koruyucudan veya uykudan devam ederken
      yetkisiz erişimi önlemek için bir parola gerektirecek şekilde ayarlayın.

  - point: Cortana veya Siri'yi Devre Dışı Bırakın
    priority: Essential
    details: >-
      Sesle kontrol edilen asistanlar, işleme için geri gönderilen veriler nedeniyle gizlilik
      etkilerine sahip olabilir. Dinleme yeteneklerini devre dışı bırakın veya sınırlayın.

  - point: Yüklü Uygulamalarınızı Gözden Geçirin
    priority: Essential
    details: >-
      Güvenlik açıklarına maruz kalmayı azaltmak için yüklü uygulamaları asgari düzeyde tutun
      ve uygulama önbelleklerini düzenli olarak temizleyin.

  - point: İzinleri Yönetin
    priority: Essential
    details: >-
      Hangi uygulamaların konumunuza, kameranıza, mikrofonunuza, kişilerinize ve diğer hassas
      bilgilere erişimi olduğunu kontrol edin.

  - point: Kullanım Verilerinin Buluta Gönderilmesine İzin Vermeyin
    priority: Essential
    details: >-
      Gizliliğinizi korumak için buluta gönderilen kullanım bilgisi veya geri bildirim miktarını
      sınırlayın.

  - point: Hızlı Kilit Açmadan Kaçının
    priority: Essential
    details: >-
      Güvenliği artırmak için bilgisayarınızın kilidini açmak için biyometrik veya kısa PIN'ler
      yerine güçlü bir parola kullanın.

  - point: Beklemede Bırakmak Yerine Bilgisayarı Kapatın
    priority: Essential
    details: >-
      Verilerinizi güvende tutmak için, özellikle diskiniz şifrelenmişse, cihazınızı kullanmadığınızda
      kapatın.

  - point: Bilgisayarınızı Microsoft veya Apple Hesabınızla Bağlamayın
    priority: Optional
    details: >-
      Veri senkronizasyonunu ve ifşasını önlemek için yalnızca yerel bir hesap kullanın. Gizliliği
      tehlikeye atan senkronizasyon hizmetlerini kullanmaktan kaçının.

  - point: Hangi Paylaşım Hizmetlerinin Etkin Olduğunu Kontrol Edin
    priority: Optional
    details: >-
      Kullanmadığınız ağ paylaşım özelliklerini devre dışı bırakarak yaygın tehditlere açılan
      kapıları kapatın.

  - point: Yönetici Olmayan Görevler İçin Root/Yönetici Hesabı Kullanmayın
    priority: Optional
    details: >-
      Günlük görevler için yetkisiz bir kullanıcı hesabı kullanın ve güvenlik açıklarını
      azaltmak için yalnızca yönetimsel değişiklikler için izinleri yükseltin.

  - point: Web Kamerasını ve Mikrofonu Engelleyin
    priority: Optional
    details: >-
      Kullanılmadığında web kameranızı kapatın ve gizliliği korumak için yetkisiz ses kaydını
      engellemeyi düşünün.

  - point: Bir Gizlilik Filtresi Kullanın
    priority: Optional
    details: >-
      Omuz üzerinden bakmayı önlemek ve hassas bilgileri korumak için umumi alanlarda bir ekran
      gizlilik filtresi kullanın.

  - point: Cihazı Fiziksel Olarak Güvence Altına Alın
    priority: Optional
    details: >-
      Umumi alanlarda dizüstü bilgisayarınızı güvence altına almak için bir Kensington Kilidi
      kullanın ve yetkisiz fiziksel erişimi önlemek için port kilitlerini düşünün.

  - point: Cihazlarınızı PC'nizden Şarj Etmeyin
    priority: Optional
    details: >-
      USB bağlantılarıyla ilişkili güvenlik risklerinden kaçınmak için PC'niz yerine bir güç
      bankası veya AC duvar şarj cihazı kullanın.

  - point: Wi-Fi'de Donanım Adresinizi Rastgele Yapın
    priority: Optional
    details: >-
      Farklı WiFi ağları arasında izlenmeye karşı korunmak için MAC adresinizi değiştirin veya
      rastgele hale getirin.

  - point: Bir Güvenlik Duvarı Kullanın
    priority: Optional
    details: >-
      Belirli uygulamalar tarafından istenmeyen internet erişimini izlemek ve engellemek,
      uzaktan erişim saldırılarına ve gizlilik ihlallerine karşı korumak için bir güvenlik
      duvarı uygulaması yükleyin.

  - point: Yazılım Tuş Kaydedicilerine Karşı Korunun
    priority: Optional
    details: >-
      Tuş vuruşlarınızı kaydeden yazılım tuş kaydedicilerine karşı korunmak için tuş vuruşu
      şifreleme araçları kullanın.

  - point: Klavye Bağlantısını Kontrol Edin
    priority: Optional
    details: >-
      Umumi veya tanıdık olmayan bilgisayarları kullanırken klavye bağlantılarını kontrol
      ederek donanım tuş kaydedicilerine karşı tetikte olun.

  - point: Tuş Vuruşu Enjeksiyon Saldırılarını Önleyin
    priority: Optional
    details: >-
      Uzaktayken PC'nizi kilitleyin ve tuş vuruşu enjeksiyon saldırılarına karşı korunmak için
      USBGuard veya benzeri araçlar kullanmayı düşünün.

  - point: Ticari "Ücretsiz" Anti-Virüs Kullanmayın
    priority: Optional
    details: >-
      Gizlilik ihlali ve veri toplama potansiyelleri nedeniyle yerleşik güvenlik araçlarına
      güvenin ve ücretsiz anti-virüs uygulamalarından kaçının.

  - point: Periyodik Olarak Rootkit Kontrolü Yapın
    priority: Advanced
    details: >-
      [chkrootkit](https://awesome-privacy.xyz/operating-systems/linux-defenses/chkrootkit)
      gibi araçları kullanarak tam sistem kontrolü tehditlerini tespit etmek ve hafifletmek
      için düzenli olarak rootkit kontrolü yapın.

  - point: BIOS Önyükleme Parolası
    priority: Advanced
    details: >-
      Önyükleme sırasında ek bir güvenlik katmanı eklemek için bir BIOS veya UEFI parolası
      etkinleştirin, ancak sınırlamalarının farkında olun.

  - point: Güvenlik Odaklı Bir İşletim Sistemi Kullanın
    priority: Advanced
    details: >-
      Gelişmiş gizlilik ve güvenlik için Linux'a veya QubeOS ya da
      [Tails](https://awesome-privacy.xyz/operating-systems/desktop-operating-systems/tails)
      gibi güvenlik odaklı bir dağıtıma geçmeyi düşünün.

  - point: Sanal Makinelerden (VM) Yararlanın
    priority: Advanced
    details: >-
      Riskli etkinlikler veya şüpheli yazılımları test etmek için sanal makineler kullanarak
      olası tehditleri birincil sisteminizden yalıtın.

  - point: Bölümlendirin
    priority: Advanced
    details: >-
      Olası ihlallerin kapsamını sınırlamak için farklı programları ve veri kaynaklarını
      birbirinden mümkün olduğunca ayrı tutun.

  - point: İstenmeyen Özellikleri Devre Dışı Bırakın (Windows)
    priority: Advanced
    details: >-
      Veri toplamayı ve kaynak kullanımını azaltmak için gereksiz Windows "özelliklerini" ve
      arka planda çalışan hizmetleri devre dışı bırakın.

  - point: Güvenli Önyükleme (Secure Boot)
    priority: Advanced
    details: >-
      Kötü amaçlı yazılımların önyükleyicinizi ve diğer kritik yazılımları değiştirmesini
      önlemek için Güvenli Önyüklemenin etkin olduğundan emin olun.

  - point: SSH Erişimini Güvence Altına Alın
    priority: Advanced
    details: >-
      Varsayılan portu değiştirerek, SSH anahtarları kullanarak ve güvenlik duvarlarını
      yapılandırarak SSH erişimini saldırılara karşı korumak için adımlar atın.

  - point: Kullanılmayan Açık Portları Kapatın
    priority: Advanced
    details: >-
      Uzaktan istismarlara karşı korunmak ve güvenliği artırmak için ihtiyaç duyulmayan
      dış portlarda dinleyen hizmetleri kapatın.

  - point: Zorunlu Erişim Kontrolü Uygulayın
    priority: Advanced
    details: >-
      Bir sistem ele geçirilirse verilebilecek zararı sınırlamak için ayrıcalıklı erişimi
      kısıtlayın.

  - point: Kanarya Belirteçleri (Canary Tokens) Kullanın
    priority: Advanced
    details: >-
      Dosyalarınıza veya e-postalarınıza yetkisiz erişimi daha hızlı tespit etmek ve saldırgan
      hakkında bilgi toplamak için kanarya belirteçleri dağıtın.
  color: pink
