- title: Akıllı Ev
  slug: smart-home
  description: Gizliliğinizden ödün vermeden IoT cihazları kullanmak
  icon: home
  intro: >-
    Ev asistanları (Google Home, Alexa ve Siri gibi) ve diğer internete bağlı cihazlar büyük
    miktarda kişisel veri toplar (ses örnekleri, konum verisi, ev ayrıntıları ve tüm etkileşimlerin
    kayıtları dahil). Neyin toplandığı, nasıl saklandığı ve ne için kullanılacağı üzerinde sınırlı
    kontrolünüz olduğundan, bu, gizlilik ve güvenliğe önem veren herkese herhangi bir tüketici
    akıllı ev ürününü önermeyi zorlaştırır.

    Güvenlik ve Gizlilik: Piyasada, kullanımı kolay ve kullanışlı olurken evinizin güvenliğini
    artırdığını iddia eden birçok akıllı cihaz vardır (Akıllı Hırsız Alarmları, İnternet Güvenlik
    Kameraları, Akıllı Kilitler ve Uzaktan Erişimli Kapı Zilleri gibi birkaç örnek). Bu cihazlar
    güvenliği kolaylaştırıyor gibi görünebilir, ancak gizlilik açısından bir ödünleşim vardır:
    büyük miktarda kişisel veri topladıkları ve bunun nasıl saklandığı veya kullanıldığı üzerinde
    kontrolsüz bıraktıkları için. Bu cihazların güvenliği de tartışmalıdır, çünkü birçoğu
    hacklenebilir (ve hacklenmektedir), bir davetsiz misafirin minimum çabayla tespitten
    kaçınmasına izin verir.

    Gizliliğe en saygılı seçenek, evinizde "akıllı" internete bağlı cihazlar kullanmamak ve
    internet bağlantısı gerektiren bir güvenlik cihazına güvenmemek olacaktır. Ancak kullanıyorsanız,
    satın almadan önce herhangi bir ürünün risklerini tam olarak anlamak önemlidir. Ardından
    gizliliği ve güvenliği artırmak için ayarları düzenleyin. Aşağıdaki liste, internete bağlı ev
    cihazlarıyla ilişkili riskleri azaltmaya yardımcı olacaktır.
  checklist:
  - point: Marka/Modeli Belirtmemek İçin Cihazları Yeniden Adlandırın
    priority: Essential
    details: >-
      Marka veya model bilgisini gizleyerek hedefli saldırıları önlemek için varsayılan cihaz
      adlarını daha jenerik bir şeyle değiştirin.

  - point: Kullanılmadığında Mikrofonu ve Kamerayı Devre Dışı Bırakın
    priority: Essential
    details: >-
      Akıllı cihazlarda mikrofonları ve kameraları kapatmak için donanım anahtarları kullanarak
      kazara kayıtlara veya hedefli erişime karşı korunun.

  - point: Hangi Verilerin Toplandığını, Saklandığını ve İletildiğini Anlayın
    priority: Essential
    details: >-
      Satın almadan önce akıllı ev cihazlarının veri işleme uygulamalarını araştırın ve bunlardan
      rahat olduğunuzdan emin olun, verileri 3. taraflarla paylaşan cihazlardan kaçının.

  - point: Gizlilik Ayarlarını Yapın ve Verilerin 3. Taraflarla Paylaşılmasından Çıkın
    priority: Essential
    details: >-
      En sıkı gizlilik kontrolleri için uygulama ayarlarını düzenleyin ve mümkün olduğunda
      3. taraflarla veri paylaşımından çıkın.

  - point: Akıllı Ev Cihazlarınızı Gerçek Kimliğinize Bağlamayın
    priority: Essential
    details: >-
      Gizliliği korumak için sosyal medya veya diğer 3. taraf hizmetler üzerinden kaydolmaktan/giriş
      yapmaktan kaçınarak anonim kullanıcı adları ve parolalar kullanın.

  - point: Donanım Yazılımını Güncel Tutun
    priority: Essential
    details: >-
      Güvenlik yamalarını ve iyileştirmeleri uygulamak için akıllı cihaz donanım yazılımını
      düzenli olarak güncelleyin.

  - point: Ağınızı Koruyun
    priority: Essential
    details: >-
      Akıllı cihazlara yetkisiz erişimi önlemek için ev WiFi'nizi ve ağınızı güvence altına alın.

  - point: Giyilebilir Cihazlara Dikkat Edin
    priority: Optional
    details: >-
      Giyilebilir cihazların kapsamlı veri toplama yeteneklerini ve bunların gizlilik üzerindeki
      etkilerini göz önünde bulundurun.

  - point: Evinizin Kritik Altyapısını İnternete Bağlamayın
    priority: Optional
    details: >-
      Bilgisayar korsanlarının olası uzaktan erişimi nedeniyle internete bağlı termostatların,
      alarmların ve dedektörlerin risklerini değerlendirin.

  - point: Alexa/Google Home Risklerini Hafifletin
    priority: Optional
    details: >-
      Sesle etkinleştirilen asistanların boşta dinlemesini önlemek için
      [Mycroft](https://awesome-privacy.xyz/smart-home-and-iot/voice-assistants/mycroft) gibi
      gizlilik odaklı alternatifleri veya Project Alias'ı kullanmayı düşünün.

  - point: Ev Ağınızı Yakından İzleyin
    priority: Optional
    details: >-
      Olağandışı ağ etkinliğini izlemek için FingBox gibi araçları veya yönlendirici özelliklerini
      kullanın.

  - point: Mümkün Olan Yerlerde İnternet Erişimini Reddedin
    priority: Advanced
    details: >-
      İhtiyacı olmayan cihazlar için internet erişimini engellemek, çalışmalarını yerel ağ
      kullanımıyla sınırlamak için güvenlik duvarları kullanın.

  - point: Riskleri Değerlendirin
    priority: Advanced
    details: >-
      Tüm hane halkı üyeleri için gizlilik etkilerini göz önünde bulundurun ve belirli zamanlarda
      cihazları devre dışı bırakmak gibi güvenlik ve gizlilik için cihaz ayarlarını düzenleyin.
  color: red
  softwareLinks:
  - title: Ev Otomasyonu
    url: https://github.com/Lissy93/awesome-privacy#home-automation
  - title: Yapay Zeka Sesli Asistanlar
    url: https://github.com/Lissy93/awesome-privacy#ai-voice-assistants

- title: Kişisel Finans
  slug: personal-finance
  description: Fonlarınızı, finansal hesaplarınızı ve işlemlerinizi korumak
  icon: finance
  intro: >-
    Kredi kartı dolandırıcılığı en yaygın kimlik hırsızlığı türüdür (2017'de yalnızca
    [ABD'de 133.015 rapor](https://www.experian.com/blogs/ask-experian/identity-theft-statistics/)
    ile) ve önceki yıla göre %26 artışla toplam 905 milyon dolar kayıp yaşandı. 2017'de kişi
    başına düşen medyan kayıp miktarı 429 dolardı. Mağdur olmaktan kendinizi korumak için temel
    adımlar atmak her zamankinden daha önemli.

    Kredi kartları hakkında not: Kredi kartlarında bazı sahte işlemleri tespit edip durdurmak
    için teknolojik yöntemler mevcuttur. Büyük ödeme işlemcileri, her bir kişinin harcama
    alışkanlıkları hakkında çok şey bilmek için kart sahiplerinden büyük miktarda veri madenciliği
    yaparak bunu uygular. Bu veriler dolandırıcılığı tespit etmek için kullanılır, ancak aynı
    zamanda diğer veri simsarlarına da satılır. Kredi kartları bu nedenle güvenlik açısından
    iyidir, ancak veri gizliliği açısından berbattır.
  checklist:
  - point: Dolandırıcılık Uyarılarına ve Kredi İzlemeye Kaydolun
    priority: Essential
    details: >-
      Şüpheli etkinlikten haberdar olmak için Experian, TransUnion veya Equifax aracılığıyla
      dolandırıcılık uyarılarını ve kredi izlemeyi etkinleştirin.

  - point: Kredi Dondurması Uygulayın
    priority: Essential
    details: >-
      Experian, TransUnion ve Equifax aracılığıyla kredinizi dondurarak yetkisiz kredi
      sorgulamalarını önleyin.

  - point: Sanal Kartlar Kullanın
    priority: Optional
    details: >-
      Gerçek bankacılık bilgilerinizi korumak için çevrimiçi işlemlerde sanal kart numaraları
      kullanın. [Privacy.com](https://awesome-privacy.xyz/finance/virtual-credit-cards/privacy.com)
      ve [MySudo](https://awesome-privacy.xyz/finance/virtual-credit-cards/mysudo) gibi hizmetler
      bu tür özellikler sunar.

  - point: Yerel İşlemler İçin Nakit Kullanın
    priority: Optional
    details: >-
      Kurumlar tarafından finansal profillemeden kaçınmak için yerel ve günlük alışverişlerde
      [Nakit](https://awesome-privacy.xyz/finance/other-payment-methods/cash) ile ödeme yapın.

  - point: Çevrimiçi İşlemler İçin Kripto Para Kullanın
    priority: Optional
    details: >-
      Anonimliği korumak için çevrimiçi işlemlerde
      [Monero](https://awesome-privacy.xyz/finance/cryptocurrencies/monero) gibi gizlilik odaklı
      kripto paraları tercih edin. Gizliliği sağlamak için kripto paraları akıllıca kullanın.

  - point: Kripto Parayı Güvenli Şekilde Saklayın
    priority: Advanced
    details: >-
      Çevrimdışı cüzdan oluşturma, [Trezor](https://awesome-privacy.xyz/finance/crypto-wallets/trezor)
      veya [ColdCard](https://awesome-privacy.xyz/finance/crypto-wallets/coldcard) gibi donanım
      cüzdanları kullanarak veya
      [CryptoSteel](https://awesome-privacy.xyz/finance/crypto-wallets/cryptosteel) gibi uzun
      vadeli depolama çözümlerini düşünerek kripto paraları güvenli bir şekilde saklayın.

  - point: Kripto Parayı Anonim Olarak Satın Alın
    priority: Advanced
    details: >-
      [LocalBitcoins](https://awesome-privacy.xyz/finance/crypto-exchanges/localbitcoins),
      [Bisq](https://awesome-privacy.xyz/finance/crypto-exchanges/bisq) veya Bitcoin ATM'leri
      gibi hizmetler aracılığıyla kimliğinizle ilişkilendirmeden kripto para satın alın.

  - point: Bozdurma/Karıştırma (Mix Coins)
    priority: Advanced
    details: >-
      İşlem izlerini gizlemek için Bitcoin'i para birimine dönüştürmeden önce bir bitcoin
      karıştırıcı veya CoinJoin kullanın.

  - point: Çevrimiçi Alışveriş İçin Takma Ad Bilgileri Kullanın
    priority: Advanced
    details: >-
      Çevrimiçi alışverişler için, kimliğinizi korumak amacıyla takma ad bilgileri, yönlendirilen
      e-posta adresleri, VOIP numaraları ve güvenli teslimat yöntemleri kullanmayı düşünün.

  - point: Alternatif Teslimat Adresi Kullanın
    priority: Advanced
    details: >-
      Satın alımları doğrudan sizinle ilişkilendirmekten kaçınmak için Posta Kutusu, yönlendirme
      adresleri veya yerel teslim alma noktaları gibi kişisel olmayan adreslere teslimatı tercih edin.
