- title: Kimlik Doğrulama
  slug: authentication
  description: Çevrimiçi hesap giriş bilgilerinizi güvence altına almak
  icon: password
  color: yellow
  intro: >-
    Bildirilen veri ihlallerinin çoğu, zayıf, varsayılan veya çalınmış parolaların kullanılmasından
    kaynaklanır ([bu Verizon raporuna](http://www.verizonenterprise.com/resources/reports/rp_dbir-2016-executive-summary_xg_en.pdf) göre).
    Uzun, güçlü ve benzersiz parolalar kullanın, bunları güvenli bir parola yöneticisinde saklayın,
    2 faktörlü kimlik doğrulamayı etkinleştirin, veri ihlallerini takip edin ve hesaplarınıza
    giriş yaparken dikkatli olun.
  checklist:
  - point: Güçlü Bir Parola Kullanın
    priority: Essential
    details: >-
      Parolanız çok kısaysa veya sözlükte bulunan kelimeler, yer isimleri ya da isimler içeriyorsa,
      kaba kuvvet saldırısıyla kolayca kırılabilir veya tahmin edilebilir. Güçlü bir parola oluşturmanın
      en kolay yolu, onu uzun tutmaktır (12+ karakter) — birçok kelimeden oluşan bir 'parola cümlesi'
      kullanmayı düşünün. Alternatif olarak, uzun ve güçlü rastgele bir parola oluşturmak için bir
      parola oluşturucu kullanın. Yaygın parolaların ne kadar hızlı kırılabileceğini görmek için
      [Security.org'un Parolam Ne Kadar Güvenli?](https://security.org/how-secure-is-my-password/) aracını deneyin.
      Güçlü parolalar oluşturma hakkında daha fazla bilgi edinin:
      [securityinabox.org](https://securityinabox.org/en/passwords/passwords/).

  - point: Parolalarınızı Tekrar Kullanmayın
    priority: Essential
    details: >-
      Biri bir parolayı tekrar kullanırsa ve hesabı olan sitelerden biri veri sızıntısı yaşarsa,
      bir saldırgan diğer hesaplarına da kolayca yetkisiz erişim sağlayabilir. Bu genellikle
      büyük ölçekli otomatik giriş istekleriyle yapılır ve Kimlik Bilgisi Doldurma (Credential
      Stuffing) olarak adlandırılır. Ne yazık ki bu oldukça yaygındır, ancak korunması basittir —
      her çevrimiçi hesabınız için farklı bir parola kullanın.

  - point: Güvenli Bir Parola Yöneticisi Kullanın
    priority: Essential
    details: >-
      Çoğu insan için yüzlerce güçlü ve benzersiz parolayı hatırlamak neredeyse imkansızdır.
      Bir parola yöneticisi, giriş bilgilerinizi sizin için oluşturan, saklayan ve otomatik dolduran
      bir uygulamadır. Tüm parolalarınız tek bir ana parolayla şifrelenir (bunu hatırlamanız gerekir
      ve çok güçlü olmalıdır). Çoğu parola yöneticisinin tarayıcı eklentileri ve mobil uygulamaları
      vardır, bu yüzden hangi cihazda olursanız olun parolalarınız otomatik doldurulabilir. İyi bir
      genel seçenek [Bitwarden](https://awesome-privacy.xyz/essentials/password-managers/bitwarden)'dir,
      veya bkz. [Önerilen Parola Yöneticileri](https://awesome-privacy.xyz/essentials/password-managers).

  - point: Parola Paylaşmaktan Kaçının
    priority: Essential
    details: >-
      Bazen bir hesaba başka bir kişiyle erişim paylaşmanız gerekebilir, ancak genellikle bundan
      kaçınmalısınız çünkü hesabın ele geçirilmesini kolaylaştırır. Kesinlikle paylaşmanız gerekiyorsa
      — örneğin ortak bir hesapla bir ekipte çalışırken — bu, bir parola yöneticisinin özellikleri
      aracılığıyla yapılmalıdır.

  - point: 2 Faktörlü Kimlik Doğrulamayı Etkinleştirin
    priority: Essential
    details: >-
      2FA, giriş yapmak için hem bildiğiniz bir şeyi (parola) hem de sahip olduğunuz bir şeyi
      (telefonunuzdaki bir kod gibi) sağlamanız gereken bir yöntemdir. Bu, biri parolanızı ele
      geçirse bile (kimlik avı, kötü amaçlı yazılım veya veri ihlali yoluyla), hesabınıza giriş
      yapamayacağı anlamına gelir. Başlaması kolaydır, telefonunuza
      [bir doğrulayıcı uygulama](https://github.com/Lissy93/awesome-privacy#2-factor-authentication)
      indirin, ardından hesap güvenlik ayarlarınıza gidip 2FA'yı etkinleştirmek için adımları izleyin.
      Yeni bir cihazda tekrar giriş yaptığınızda, telefonunuzdaki uygulamada görüntülenen kod istenecektir
      (internetsiz çalışır ve kod genellikle her 30 saniyede bir değişir).

  - point: Yedek Kodları Güvende Tutun
    priority: Essential
    details: >-
      Çok faktörlü kimlik doğrulamayı etkinleştirdiğinizde, genellikle 2FA yönteminiz kaybolduğunda,
      bozulduğunda veya kullanılamadığında kullanabileceğiniz birkaç kod verilir. Kaybolmalarını
      veya yetkisiz erişimi önlemek için bu kodları güvenli bir yerde saklayın. Bunları kağıt üzerinde
      veya diskte güvenli bir yerde saklamalısınız (örneğin çevrimdışı depolamada veya şifreli bir
      dosyada/sürücüde). 2FA kaynakları ve parolalar ayrı tutulmalı olduğundan, bunları parola
      yöneticinizde saklamayın.

  - point: İhlal Uyarılarına Kaydolun
    priority: Optional
    details: >-
      Bir web sitesi büyük bir veri ihlali yaşadıktan sonra, sızdırılan veriler genellikle internette
      dolaşmaya başlar. Birkaç web sitesi bu sızdırılan kayıtları toplar ve herhangi bir e-posta
      adresinizin listelerinde olup olmadığını kontrol etmenize izin verir.
      [Firefox Monitor](https://monitor.firefox.com), [Have I Been Pwned](https://haveibeenpwned.com)
      ve [DeHashed](https://dehashed.com), e-posta adresiniz herhangi bir yeni veri setinde
      görünürse sizi bilgilendirecek şekilde izlemeye kaydolmanıza olanak tanır. Bu durum
      gerçekleştiğinde mümkün olan en kısa sürede bilmek faydalıdır, böylece etkilenen hesaplar
      için parolalarınızı değiştirebilirsiniz. [Have i been pwned](https://awesome-privacy.xyz/security-tools/online-tools/have-i-been-pwned)
      ayrıca alan adı genelinde bildirim özelliğine sahiptir; tüm alan adınız altındaki e-posta
      adresleri görünürse uyarı alabilirsiniz (eğer [anonim yönlendirme](https://github.com/Lissy93/awesome-privacy#anonymous-mail-forwarding)
      için takma adlar kullanıyorsanız faydalıdır).

  - point: Parolanızı/PIN'inizi Gizleyin
    priority: Optional
    details: >-
      Herkese açık yerlerde parolanızı yazarken, bir CCTV kamerasının doğrudan görüş alanında
      olmadığınızdan ve kimsenin omzunuzun üzerinden bakmadığından emin olun. Yazarken parolanızı
      veya PIN kodunuzu örtün ve ekranınızda hiçbir düz metin parolayı ifşa etmeyin.

  - point: Kritik Parolaları Periyodik Olarak Güncelleyin
    priority: Optional
    details: >-
      Veritabanı sızıntıları ve ihlalleri yaygındır ve muhtemelen parolalarınızdan birkaçı zaten
      çevrimiçi bir yerdedir. Güvenlik açısından kritik hesapların parolalarını ara sıra güncellemek
      bunu hafifletmeye yardımcı olabilir. Ancak tüm parolalarınızın uzun, güçlü ve benzersiz olması
      koşuluyla, bunu çok sık yapmaya gerek yoktur — yılda bir yeterli olmalıdır. Kuruluşlar içinde
      zorunlu parola değişikliklerini uygulamak
      [artık önerilmemektedir](https://duo.com/decipher/microsoft-will-no-longer-recommend-forcing-periodic-password-changes),
      çünkü bu, çalışanların daha zayıf parolalar seçmesini teşvik eder.

  - point: Parolanızı Tarayıcılarda Kaydetmeyin
    priority: Optional
    details: >-
      Çoğu modern tarayıcı, bir siteye giriş yaptığınızda kimlik bilgilerinizi kaydetmeyi teklif eder.
      Buna izin vermeyin, çünkü her zaman şifrelenmiş değildirler ve birinin hesaplarınıza erişmesine
      izin verebilirler. Bunun yerine, parolalarınızı saklamak (ve otomatik doldurmak) için özel bir
      parola yöneticisi kullanın.

  - point: Başkasının Cihazında Giriş Yapmaktan Kaçının
    priority: Optional
    details: >-
      Sisteminin temiz olduğundan emin olamayacağınız için başkalarının bilgisayarlarında giriş
      yapmaktan kaçının. Kötü amaçlı yazılım ve izlemenin burada daha yaygın olması nedeniyle
      herkese açık makinelere karşı özellikle dikkatli olun. Başkasının cihazını kullanmak, çevrimiçi
      bankacılık gibi kritik hesaplarla özellikle tehlikelidir. Başkasının makinesini kullanırken,
      gizli/gizli sekme oturumunda olduğunuzdan emin olun (Ctrl+Shift+N / Cmd+Shift+N kullanın).
      Bu, tarayıcının kimlik bilgilerinizi, çerezlerinizi ve tarama geçmişinizi kaydetmemesini sağlar.

  - point: Parola İpuçlarından Kaçının
    priority: Optional
    details: >-
      Bazı siteler parola ipuçları belirlemenize izin verir. Çoğu zaman, cevapları tahmin etmek
      çok kolaydır. Parola ipuçlarının zorunlu olduğu durumlarda, rastgele cevaplar kullanın ve
      bunları parola yöneticinize kaydedin (`İlk okulunuzun adı: 6D-02-8B-!a-E8-8F-81`).

  - point: Çevrimiçi Güvenlik Sorularını Asla Doğru Şekilde Yanıtlamayın
    priority: Optional
    details: >-
      Bir site güvenlik soruları soruyorsa (doğum yeri, annenizin kızlık soyadı veya ilk arabanız
      gibi), gerçek cevaplar vermeyin. Bilgisayar korsanlarının bu bilgileri internette veya sosyal
      mühendislik yoluyla bulması önemsiz bir iştir. Bunun yerine kurgusal bir cevap oluşturun ve
      onu parola yöneticinizde saklayın. Gerçek kelimeler kullanmak rastgele karakterlerden daha
      iyidir, [burada açıklandığı gibi](https://news.ycombinator.com/item?id=29244870).

  - point: 4 Haneli Bir PIN Kullanmayın
    priority: Optional
    details: >-
      Akıllı telefonunuza veya bilgisayarınıza erişmek için kısa bir PIN kullanmayın. Bunun yerine
      bir metin parolası veya çok daha uzun bir PIN kullanın. Sayısal parola cümleleri kolayca kırılır
      (4 haneli bir PIN'in 10.000 kombinasyonu vardır, 4 karakterli alfanümerik bir kod için ise
      7,4 milyon).

  - point: 2FA İçin SMS Kullanmaktan Kaçının
    priority: Optional
    details: >-
      Çok faktörlü kimlik doğrulamayı etkinleştirirken, destekleniyorsa uygulama tabanlı kodları
      veya donanım belirtecini tercih edin. SMS, [SIM değiştirme](https://www.maketecheasier.com/sim-card-hijacking)
      ve [araya girme](https://secure-voice.com/ss7_attacks) gibi birçok yaygın tehdide karşı
      savunmasızdır. Ayrıca telefon numaranızın ne kadar güvenli saklanacağı veya başka ne için
      kullanılacağına dair bir garanti yoktur. Pratik açıdan, SMS yalnızca sinyaliniz olduğunda
      çalışır ve yavaş olabilir. Bir web sitesi veya hizmet kurtarma için bir SMS numarası gerektiriyorsa,
      bu durumlar için yalnızca hesap kurtarma amacıyla kullanılan ikinci bir ön ödemeli telefon
      numarası satın almayı düşünün.

  - point: 2FA Kodlarını Oluşturmak İçin Parola Yöneticinizi Kullanmaktan Kaçının
    priority: Advanced
    details: >-
      Birçok parola yöneticisi 2FA kodları da oluşturabilir. Ele geçirilmesi durumunda tek bir
      hata noktası haline geleceğinden, birincil parola yöneticinizi 2FA doğrulayıcınız olarak da
      kullanmamak en iyisidir. Bunun yerine telefonunuzda veya dizüstü bilgisayarınızda özel bir
      [doğrulayıcı uygulama](https://github.com/Lissy93/awesome-privacy#2-factor-authentication)
      kullanın.

  - point: Yüz Tanıma İle Kilit Açmaktan Kaçının
    priority: Advanced
    details: >-
      Çoğu telefon ve dizüstü bilgisayar, yüzünüzün bir görüntüsünü kaydedilmiş bir hash ile
      karşılaştırmak için kamerayı kullanan bir yüz tanıma kimlik doğrulama özelliği sunar. Çok
      kullanışlı olabilir, ancak dijital fotoğraflar ve CCTV görüntülerinden yeniden yapılandırmalar
      yoluyla [kandırmanın](https://www.forbes.com/sites/jvchamary/2017/09/18/security-apple-face-id-iphone-x/)
      birçok yolu vardır ve cihaza erişim sağlanabilir. Parolanızın aksine, yüzünüzün internette
      fotoğrafları ve gözetim kameraları tarafından kaydedilmiş videoları olması muhtemeldir.

  - point: Tuş Kaydedicilere (Keylogger) Dikkat Edin
    priority: Advanced
    details: >-
      Donanım [tuş kaydedici](https://en.wikipedia.org/wiki/Hardware_keylogger), klavyeniz ile USB
      portu arasına yerleştirilen ve tüm tuş vuruşlarını yakalayıp bazen verileri uzak bir sunucuya
      ileten fiziksel bir cihazdır. Bir bilgisayar korsanına yazılan her şeye, parolalar dahil,
      erişim sağlar. Korunmanın en iyi yolu, bilgisayarınız gözetimsiz kaldıktan sonra USB
      bağlantınızı kontrol etmektir. Tuş kaydedicilerin klavye kasasının içine yerleştirilmesi de
      mümkündür, bu yüzden kasanın kurcalanmış olabileceğine dair işaretlere dikkat edin ve işe
      kendi klavyenizi getirmeyi düşünün. Sanal klavyede yazılan, panodan yapıştırılan veya bir
      parola yöneticisi tarafından otomatik doldurulan veriler donanım tuş kaydedicileri tarafından
      yakalanamaz.

  - point: Bir Donanım Belirteci (Token) Düşünün
    priority: Advanced
    details: >-
      Bir U2F/FIDO2 güvenlik anahtarı, kimliğinizi doğrulayıcınızdan bir OTP girmek yerine, çevrimiçi
      bir hizmete giriş yaparken taktığınız bir USB (veya NFC) cihazıdır. [SoloKey](https://solokeys.com)
      ve [NitroKey](https://www.nitrokey.com) bu tür anahtarlara örnektir. Beraberinde çeşitli güvenlik
      avantajları getirirler. Tarayıcı doğrudan cihazla iletişim kurduğu için, TLS sertifikası kontrol
  - point: Mümkün Olan Yerlerde Geçiş Anahtarlarını (Passkey) Kullanın
    priority: Recommended
    details: >-
      Geçiş anahtarları (Passkeys, FIDO2 WebAuthn olarak da bilinir), geleneksel parolalardan daha
      güvenli ve kullanışlı olan parolasız bir kimlik doğrulama yöntemidir. Giriş yapmak için
      cihazınızın biyometrik doğrulamasını (parmak izi, yüz kimliği) veya bir PIN kullanır ve
      kimlik avı saldırılarına karşı dirençlidir. Google, Apple, Microsoft ve GitHub dahil birçok
      büyük hizmet artık geçiş anahtarlarını desteklemektedir. Parola alternatifi veya ek bir 2FA
      yöntemi olarak sunulan hesaplarda geçiş anahtarlarını etkinleştirmeyi düşünün.
      edildiği için hangi ana bilgisayarın kimlik doğrulama istediği konusunda kandırılamaz.
      [Bu yazı](https://security.stackexchange.com/a/71704), FIDO U2F belirteçlerinin kullanımının
      güvenliğine dair iyi bir açıklamadır. Elbette, fiziksel anahtarı güvenli bir yerde saklamak
      veya üzerinizde taşımak önemlidir. Bazı çevrimiçi hesaplar birden fazla 2FA yönteminin
      etkinleştirilmesine izin verir.

  - point: Çevrimdışı Parola Yöneticisi Düşünün
    priority: Advanced
    details: >-
      Artırılmış güvenlik için, şifreli çevrimdışı bir parola yöneticisi verileriniz üzerinde tam
      kontrol sağlar. [KeePass](https://awesome-privacy.xyz/essentials/password-managers/keepass)
      popüler bir seçenektir, ek uyumluluk ve işlevsellik sunan çok sayıda
      [eklenti](https://[KeePass](https://awesome-privacy.xyz/essentials/password-managers/keepass).info/plugins.html)
      ve topluluk çatalları vardır. Popüler istemciler arasında:
      [KeePassXC](https://keepassxc.org) (masaüstü), [KeePassDX](https://www.keepassdx.com) (Android)
      ve [StrongBox](https://apps.apple.com/us/app/strongbox-password-safe/id897283731) (iOS) bulunur.
      Dezavantajı, bazıları için biraz daha az kullanışlı olabilmesi ve yedekleme ile güvenli
      saklamanın size kalmasıdır.

  - point: Benzersiz Kullanıcı Adları Düşünün
    priority: Advanced
    details: >-
      Her hesap için farklı parolalara sahip olmak iyi bir ilk adımdır, ancak giriş yapmak için
      benzersiz bir kullanıcı adı, e-posta veya telefon numarası da kullanırsanız, yetkisiz erişim
      sağlamaya çalışan biri için işler önemli ölçüde zorlaşır. Birden fazla e-posta için en kolay
      yöntem, anonim posta yönlendirme için otomatik oluşturulan takma adları kullanmaktır. Bu,
      [herhangi bir şey]@sizinalanadiniz.com adresine gelen postaların gelen kutunuza düşmesini
      sağlar ve her hesap için farklı bir e-posta kullanmanıza olanak tanır (bkz.
      [Posta Takma Ad Sağlayıcıları](https://github.com/Lissy93/awesome-privacy#mail-forwarding)).
      Kullanıcı adları daha kolaydır çünkü bunları oluşturmak, saklamak ve otomatik doldurmak için
      parola yöneticinizi kullanabilirsiniz. Sanal telefon numaraları VOIP sağlayıcınız aracılığıyla
      oluşturulabilir.
  softwareLinks:
    - title: Parola Yöneticileri
      url: https://awesome-privacy.xyz/essentials/password-managers
    - title: 2 Faktörlü Kimlik Doğrulama
      url: https://awesome-privacy.xyz/essentials/2-factor-authentication

- title: Web Tarama
  slug: web-browsing
  description: Çevrimiçi izlenme, sansür ve veri toplamayı önlemek
  icon: browser
  intro: >-
    İnternetteki çoğu web sitesi, genellikle kullanıcılarının davranışları ve tercihleri hakkında
    bilgi edinmek için bir tür izleme kullanır. Bu veriler inanılmaz derecede ayrıntılı olabilir
    ve bu nedenle şirketler, hükümetler ve fikri mülkiyet hırsızları için son derece değerlidir.
    Veri ihlalleri ve sızıntılar yaygındır ve kullanıcıların web etkinliğinin anonimliğini kaldırmak
    genellikle önemsiz bir iştir.


    İki ana izleme yöntemi vardır; durum bilgili (çerez tabanlı) ve durum bilgisiz
    (parmak izi tabanlı). Çerezler, sizi tanımlamak için kullanılan benzersiz bir kimliğe sahip,
    tarayıcınızda saklanan küçük bilgi parçalarıdır. Tarayıcı parmak izi, kullanıcıları çevrimiçi
    her gittikleri yerde tanımlamak ve izlemek için son derece doğru bir yöntemdir. Toplanan
    bilgiler oldukça kapsamlıdır ve genellikle tarayıcı ayrıntılarını, işletim sistemini, ekran
    çözünürlüğünü, desteklenen yazı tiplerini, eklentileri, saat dilimini, dil ve yazı tipi
    tercihlerini ve hatta donanım yapılandırmalarını içerir.


    Bu bölüm, tehditlerden daha iyi korunmak, çevrimiçi izlemeyi en aza indirmek ve gizliliği
    artırmak için atabileceğiniz adımları özetlemektedir.
  checklist:
  - point: Reklamları Engelleyin
    priority: Essential
    details: >-
      Bir reklam engelleyici kullanmak, reklamların uyguladığı izleyicileri engelleyerek
      gizliliğinizi artırmaya yardımcı olabilir. [uBlock Origin](https://awesome-privacy.xyz/networking/ad-blockers/ublock-origin),
      Raymond Hill tarafından geliştirilen çok verimli ve açık kaynaklı bir tarayıcı eklentisidir.
      Bir web sayfasında 3. taraf reklamlar görüntülendiğinde, sizi izleme, sizin ve alışkanlıklarınız
      hakkında kişisel bilgi toplama yeteneğine sahiptirler; bu bilgiler daha sonra satılabilir veya
      size daha hedefli reklamlar göstermek için kullanılabilir ve bazı reklamlar tamamen kötü amaçlı
      veya sahtedir. Reklamları engellemek ayrıca sayfaların daha hızlı yüklenmesini sağlar, daha az
      veri kullanır ve daha az karmaşık bir deneyim sunar.

  - point: Web Sitesinin Meşru Olduğundan Emin Olun
    priority: Basic
    details: >-
      Kulağa bariz gelebilir, ancak herhangi bir çevrimiçi hesaba giriş yaparken URL'nin doğru
      olduğunu iki kez kontrol edin. Sık ziyaret edilen siteleri yer imlerinizde saklamak, URL'nin
      kolayca bulunmasını sağlamanın iyi bir yoludur. Yeni web sitelerini ziyaret ederken, güvenli
      olmayabileceğine dair yaygın işaretlere dikkat edin: Tarayıcı uyarıları, yönlendirmeler, sitede
      spam ve açılır pencereler. Emin değilseniz bir web sitesini şu gibi bir araçla da kontrol
      edebilirsiniz: [Virus Total](https://awesome-privacy.xyz/security-tools/online-tools/virus-total),
      [IsLegitSite](https://www.islegitsite.com), [Google Safe Browsing Durumu](https://transparencyreport.google.com/safe-browsing/search).

  - point: Tarayıcı Kötü Amaçlı Yazılımlarına Dikkat Edin
    priority: Basic
    details: >-
      Sisteminiz veya tarayıcınız casus yazılımlar, madenciler, tarayıcı ele geçiriciler, kötü
      amaçlı yönlendirmeler, reklam yazılımları vb. tarafından tehlikeye atılabilir. Genellikle
      şunları yaparak korunabilirsiniz: açılır pencereleri görmezden gelin, neye tıkladığınıza
      dikkat edin, tarayıcınız kötü amaçlı olabileceğini uyarıyorsa bir web sitesine devam etmeyin.
      Tarayıcı kötü amaçlı yazılımının yaygın işaretleri şunlardır: varsayılan arama motoru veya
      ana sayfanın değiştirilmiş olması, araç çubukları, tanıdık olmayan uzantılar veya simgeler,
      önemli ölçüde daha fazla reklam, hatalar ve sayfaların her zamankinden çok daha yavaş
      yüklenmesi. Heimdal'dan gelen bu makaleler
      [tarayıcı kötü amaçlı yazılım belirtilerini](https://heimdalsecurity.com/blog/warning-signs-operating-system-infected-malware),
      [tarayıcıların nasıl enfekte olduğunu](https://heimdalsecurity.com/blog/practical-online-protection-where-malware-hides)
      ve [tarayıcı kötü amaçlı yazılımının nasıl kaldırılacağını](https://heimdalsecurity.com/blog/malware-removal) açıklar.

  - point: Gizliliğe Saygılı Bir Tarayıcı Kullanın
    priority: Essential
    details: >-
      [Firefox](https://awesome-privacy.xyz/essentials/browsers/firefox) (birkaç ayarlamayla) ve
      [Brave](https://awesome-privacy.xyz/essentials/browsers/brave-browser) güvenli, gizliliğe
      saygılı tarayıcılardır. İkisi de hızlı, açık kaynaklı, kullanıcı dostu ve tüm önemli işletim
      sistemlerinde kullanılabilir. Tarayıcınız çevrimiçi yaptığınız her şeye erişebilir, bu yüzden
      mümkünse Google Chrome, Edge ve Safari'den kaçının çünkü (doğru yapılandırma olmadan) üçü de
      kullanım verilerini toplar, eve rapor gönderir ve müdahaleci izlemeye izin verir. Firefox'un
      optimum güvenliğe ulaşması için birkaç değişiklik gerekir, örneğin
      [arkenfox](https://github.com/arkenfox/user.js/wiki) veya
      [12byte](https://12bytes.org/firefox-configuration-guide-for-privacy-freaks-and-performance-buffs/)'ın
      user.js yapılandırmaları. Daha fazlası için bkz.
      [Gizlilik Tarayıcıları](https://github.com/Lissy93/awesome-privacy#browsers).

  - point: Gizli Bir Arama Motoru Kullanın
    priority: Essential
    details: >-
      Gizliliği koruyan, izlemeyen bir arama motoru kullanmak, arama terimlerinizin kaydedilmesi
      veya aleyhinize kullanılması riskini azaltır. [DuckDuckGo](https://awesome-privacy.xyz/essentials/search-engines/duckduckgo)
      veya [Qwant](https://awesome-privacy.xyz/essentials/search-engines/qwant)'ı düşünün. Google,
      [inanılmaz derecede müdahaleci](https://hackernoon.com/data-privacy-concerns-with-google-b946f2b7afea)
      izleme politikaları uygular ve [önyargılı arama sonuçları](https://www.businessinsider.com/evidence-that-google-search-results-are-biased-2014-10)
      görüntüleme geçmişine sahiptir. Bu nedenle Google, Bing, Baidu, Yahoo ve Yandex ile birlikte
      gizliliğini korumak isteyen herkes için uygun değildir. [Tarayıcınızın varsayılan aramasını](https://duckduckgo.com/install)
      gizliliğe saygılı bir arama motoruna güncellemeniz önerilir.

  - point: Gereksiz Tarayıcı Eklentilerini Kaldırın
    priority: Essential
    details: >-
      Uzantılar, tarayıcıda yaptığınız her şeyi görebilir, kaydedebilir veya değiştirebilir ve bazı
      masum görünen tarayıcı uygulamalarının kötü niyetleri vardır. Web siteleri hangi uzantıları
      yüklediğinizi görebilir ve bunu parmak izinizi geliştirmek, sizi daha doğru bir şekilde
      tanımlamak/izlemek için kullanabilir. Hem [Firefox](https://awesome-privacy.xyz/essentials/browsers/firefox)
      hem de Chrome mağazaları, yüklemeden önce bir uzantının hangi izinlere/erişim haklarına
      ihtiyaç duyduğunu kontrol etmenize izin verir. Değerlendirmeleri kontrol edin. Yalnızca
      gerçekten ihtiyacınız olan uzantıları yükleyin ve bir süredir kullanmadıklarınızı kaldırın.

  - point: Tarayıcıyı Güncel Tutun
    priority: Essential
    details: >-
      Tarayıcı güvenlik açıkları sürekli olarak
      [keşfedilmekte](https://cve.mitre.org/cgi-bin/cvekey.cgi?keyword=browser) ve düzeltilmektedir,
      bu yüzden bir sıfırıncı gün açığından kaçınmak için güncel tutmak önemlidir.
      [Hangi tarayıcı sürümünü kullandığınızı buradan görebilir](https://www.whatismybrowser.com/)
      veya güncelleme talimatları için [bu kılavuzu](https://www.whatismybrowser.com/guides/how-to-update-your-browser/)
      takip edebilirsiniz. Bazı tarayıcılar en son kararlı sürüme otomatik olarak güncellenir.

  - point: HTTPS Kontrolü Yapın
    priority: Essential
    details: >-
      HTTPS olmayan bir web sitesinde bilgi girerseniz, bu veriler şifrelenmeden taşınır ve bu
      nedenle onu ele geçiren herkes tarafından okunabilir. HTTPS olmayan bir web sitesinde asla
      veri girmeyin, ancak yeşil kilit simgesinin size yanlış bir güven duygusu vermesine de izin
      vermeyin — bir web sitesinin SSL sertifikası olması, meşru veya güvenilir olduğu anlamına
      gelmez. [HTTPS-Everywhere](https://www.eff.org/https-everywhere) ([EFF](https://www.eff.org/)
      tarafından geliştirilen), web sitelerinde HTTPS'yi otomatik olarak etkinleştiren bir tarayıcı
      uzantısıydı, ancak 2022 itibarıyla artık kullanımdan kaldırılmıştır. EFF,
      [duyuru makalesinde](https://www.eff.org/) çoğu tarayıcının artık bu tür korumaları entegre
      ettiğini açıklıyor. Ayrıca, [Firefox](https://awesome-privacy.xyz/essentials/browsers/firefox),
      Chrome, Edge ve Safari tarayıcılarının HTTPS güvenli korumalarını nasıl etkinleştireceğinize
      dair talimatlar sağlar.

  - point: DNS-over-HTTPS Kullanın
    priority: Essential
    details: >-
      Geleneksel DNS, isteklerini herkesin görebileceği düz metin olarak yapar. Bu, ortadaki adam
      saldırıları yoluyla DNS verilerinin dinlenmesine ve değiştirilmesine izin verir. DNS-over-HTTPS
      ise DNS çözümlemesini HTTPS protokolü üzerinden gerçekleştirir, yani sizinle DNS çözümleyiciniz
      arasındaki veriler şifrelenir. Popüler bir seçenek
      [CloudFlare](https://awesome-privacy.xyz/networking/dns-providers/cloudflare)'ın
      [1.1.1.1](https://awesome-privacy.xyz/security-tools/mobile-apps/1.1.1.1)'idir veya
      sağlayıcıları karşılaştırın — tarayıcı içinde etkinleştirmek basittir. DoH'un kendine özgü
      sorunları olduğunu unutmayın, çoğunlukla web filtrelemeyi engeller.

  - point: Çoklu [Session](https://awesome-privacy.xyz/communication/encrypted-messaging/session) Konteynerleri
    priority: Essential
    details: >-
      Tarama alışkanlığınızın farklı yönlerini ayrı tutmak için bölümlendirme gerçekten önemlidir.
      Örneğin, iş, genel gezinme, sosyal medya, çevrimiçi alışveriş vb. için farklı profiller
      kullanmak, veri simsarlarının size geri bağlayabileceği ilişki sayısını azaltır. Bir seçenek,
      tam olarak bu amaç için tasarlanmış
      [Firefox Containers](https://awesome-privacy.xyz/security-tools/browser-extensions/firefox-multi-account-containers)
      kullanmaktır. Alternatif olarak, farklı görevler için farklı tarayıcılar kullanabilirsiniz
      ([Brave](https://awesome-privacy.xyz/essentials/browsers/brave-browser),
      [Firefox](https://awesome-privacy.xyz/essentials/browsers/firefox),
      [Tor](https://awesome-privacy.xyz/networking/mix-networks/tor) vb.).

  - point: Gizli Sekme Kullanın
    priority: Essential
    details: >-
      Başkasının makinesini kullanırken, gizli/gizli sekme oturumunda olduğunuzdan emin olun.
      Bu, tarayıcı geçmişinin, çerezlerin ve bazı verilerin kaydedilmesini önler, ancak kusursuz
      değildir — yine de izlenebilirsiniz.

  - point: Tarayıcı Parmak İzinizi Anlayın
    priority: Essential
    details: >-
      Tarayıcı Parmak İzi, bir web sitesinin sizi cihaz bilgilerinize göre tanımladığı inanılmaz
      derecede doğru bir izleme yöntemidir. Parmak izinizi amiunique.org adresinde görüntüleyebilirsiniz
      — amaç mümkün olduğunca benzersiz olmamaktır.

  - point: Çerezleri Yönetin
    priority: Essential
    details: >-
      Çerezleri düzenli olarak temizlemek, web sitelerinin sizi izlemesini azaltmaya yardımcı
      olacak bir adımdır. Çerezler ayrıca oturum belirtecinizi de saklayabilir; bu ele geçirilirse,
      birinin kimlik bilgileri olmadan hesaplarınıza erişmesine izin verebilir. Bunu azaltmak için
      çerezleri sık sık temizlemelisiniz.

  - point: 3. Taraf Çerezleri Engelleyin
    priority: Essential
    details: >-
      3. taraf çerezler, ziyaret ettiğiniz siteden farklı bir web sitesi tarafından cihazınıza
      yerleştirilir. Bu, 3. bir varlığın mevcut oturumunuzdan veri toplayabilmesi nedeniyle bir
      gizlilik riski oluşturur. Bu kılavuz, 3. taraf çerezleri nasıl devre dışı bırakabileceğinizi
      açıklar ve bunun işe yaradığından emin olmak için burayı kontrol edebilirsiniz.

  - point: 3. Taraf İzleyicileri Engelleyin
    priority: Essential
    details: >-
      İzleyicileri engellemek, web sitelerinin, reklamcıların, analitik hizmetlerinin ve daha
      fazlasının arka planda sizi izlemesini durdurmaya yardımcı olur.
      [Privacy Badger](https://awesome-privacy.xyz/security-tools/browser-extensions/privacy-badger),
      [DuckDuckGo Privacy Essentials](https://awesome-privacy.xyz/security-tools/browser-extensions/privacy-essentials),
      [uBlock Origin](https://awesome-privacy.xyz/networking/ad-blockers/ublock-origin) ve uMatrix
      (gelişmiş) tüm büyük tarayıcılar için mevcut, çok etkili, açık kaynaklı izleyici engelleyicilerdir.

  - point: Yönlendirmelere Dikkat Edin
    priority: Optional
    details: >-
      Bazı yönlendirmeler zararsız olsa da, doğrulanmamış yönlendirmeler gibi diğerleri kimlik avı
      saldırılarında kullanılır ve kötü amaçlı bir bağlantıyı meşru gösterebilir. Bir yönlendirme
      URL'sinden emin değilseniz, RedirectDetective gibi bir araçla nereye yönlendirdiğini kontrol
      edebilirsiniz.

  - point: Tarayıcınıza Giriş Yapmayın
    priority: Optional
    details: >-
      Birçok tarayıcı, geçmişi, yer imlerini ve diğer tarama verilerini cihazlar arasında
      senkronize etmek için giriş yapmanıza izin verir. Ancak bu yalnızca daha fazla veri
      toplanmasına izin vermekle kalmaz, aynı zamanda kötü niyetli bir aktörün kişisel bilgilere
      ulaşması için başka bir yol sağlayarak saldırı yüzeyini de artırır.

  - point: Tahmin Hizmetlerine İzin Vermeyin
    priority: Optional
    details: >-
      Bazı tarayıcılar, gerçek zamanlı arama sonuçları veya URL otomatik doldurma aldığınız
      tahmin hizmetlerine izin verir. Bu etkinleştirilmişse, her tuş vuruşunda (Enter'a
      bastığınızda değil) Google'a (veya varsayılan arama motorunuza) veri gönderilir.

  - point: Web Sayfaları İçin G Translate Kullanmaktan Kaçının
    priority: Optional
    details: >-
      Yabancı bir dilde yazılmış bir web sayfasını ziyaret ettiğinizde, Google Translate uzantısını
      yüklemeniz istenebilir. Google'ın mevcut kullanıcının ayrıntılarıyla birlikte tüm verileri
      (giriş alanları dahil) topladığının farkında olun. Bunun yerine tarayıcınıza bağlı olmayan
      bir çeviri hizmeti kullanın.

  - point: Web Bildirimlerini Devre Dışı Bırakın
    priority: Optional
    details: >-
      Tarayıcı push bildirimleri, kaynağı taklit etmenin kolay olması nedeniyle suçluların
      bağlantılarına tıklamanızı sağlamak için yaygın bir yöntemdir. Bunun farkında olun ve tarayıcı
      bildirimlerini devre dışı bırakma talimatları için bu makaleye bakın.

  - point: Otomatik İndirmeleri Devre Dışı Bırakın
    priority: Optional
    details: >-
      Drive-by indirmeler, zararlı dosyaları bir kullanıcının cihazına ulaştırmanın yaygın bir
      yöntemidir. Bu, otomatik dosya indirmelerini devre dışı bırakarak ve beklenmedik şekilde
      dosya indirmenizi isteyen web sitelerine karşı dikkatli olarak azaltılabilir.

  - point: Sensörlere Erişime İzin Vermeyin
    priority: Optional
    details: >-
      Mobil web siteleri sormadan cihaz sensörlerinize ulaşabilir. Bu izinleri tarayıcınıza bir
      kez verirseniz, tüm web siteleri izin veya bildirim olmadan bu yeteneklerden yararlanabilir.

  - point: Konumu Devre Dışı Bırakın
    priority: Optional
    details: >-
      Konum Hizmetleri, sitelerin deneyiminizi iyileştirmek için fiziksel konumunuzu sormasına
      izin verir. Bu ayarlarda devre dışı bırakılmalıdır. Yaklaşık konumunuzu belirlemenin başka
      yöntemleri olduğunu unutmayın.

  - point: Kamera/Mikrofon Erişimine İzin Vermeyin
    priority: Optional
    details: >-
      Hiçbir web sitesine web kamerasına veya mikrofona erişim izni verilmediğinden emin olmak
      için tarayıcı ayarlarını kontrol edin. Ayrıca web kamerası kapağı ve mikrofon engelleyici
      gibi fiziksel koruma kullanmak da faydalı olabilir.

  - point: Tarayıcı Parola Kaydetmelerini Devre Dışı Bırakın
    priority: Optional
    details: >-
      Tarayıcınızın kullanıcı adlarını ve parolaları saklamasına izin vermeyin. Bunlar kolayca
      görüntülenebilir veya erişilebilir. Bunun yerine bir parola yöneticisi kullanın.

  - point: Tarayıcı Otomatik Doldurmayı Devre Dışı Bırakın
    priority: Optional
    details: >-
      Herhangi bir gizli veya kişisel ayrıntı için otomatik doldurmayı kapatın. Bu özellik,
      tarayıcınız herhangi bir şekilde ele geçirilirse zararlı olabilir. Bunun yerine parola
      yöneticinizin Notlar özelliğini kullanmayı düşünün.

  - point: Exfil Saldırısından Korunun
    priority: Optional
    details: >-
      CSS Exfiltrate saldırısı, sadece saf CSS ile kimlik bilgilerinin ve diğer hassas ayrıntıların
      ele geçirilebildiği bir yöntemdir.
      [CSS Exfil Protection](https://awesome-privacy.xyz/security-tools/browser-extensions/css-exfil-protection)
      eklentisi ile korunabilirsiniz.

  - point: ActiveX'i Devre Dışı Bırakın
    priority: Optional
    details: >-
      ActiveX, Microsoft IE'ye yerleşik ve varsayılan olarak etkin olan bir tarayıcı uzantı
      API'sidir. Artık yaygın olarak kullanılmıyor, ancak eklentilere yakın erişim hakları
      verdiğinden ve tehlikeli olabileceğinden, devre dışı bırakmalısınız.

  - point: WebRTC'yi Devre Dışı Bırakın
    priority: Optional
    details: >-
      WebRTC, doğrudan tarayıcıdan yüksek kaliteli ses/video iletişimi ve eşler arası dosya
      paylaşımına izin verir. Ancak bir gizlilik sızıntısı oluşturabilir. Daha fazla bilgi için
      bu kılavuza bakın.

  - point: HTML5 Canvas İmzasını Sahtele
    priority: Optional
    details: >-
      Canvas Parmak İzi, web sitelerinin kullanıcıları çok doğru bir şekilde tanımlamasına ve
      izlemesine olanak tanır. Parmak izinizi sahtelemek için Canvas-Fingerprint-Blocker
      uzantısını kullanabilir veya [Tor](https://awesome-privacy.xyz/networking/mix-networks/tor)
      kullanabilirsiniz.

  - point: Kullanıcı Aracısını (User Agent) Sahtele
    priority: Optional
    details: >-
      Kullanıcı aracısı, web sitesine hangi cihazı, tarayıcıyı ve sürümü kullandığınızı söyler.
      Kullanıcı aracısını periyodik olarak değiştirmek, daha az benzersiz olmak için atabileceğiniz
      küçük bir adımdır.

  - point: DNT'yi Görmezden Gelin
    priority: Optional
    details: >-
      Do Not Track'i etkinleştirmenin çok sınırlı bir etkisi vardır, çünkü birçok web sitesi buna
      saygı göstermez veya uymaz. Nadiren kullanıldığından, imzanıza da ekleyerek sizi daha
      benzersiz hale getirebilir.

  - point: HSTS İzlemeyi Önleyin
    priority: Optional
    details: >-
      HSTS, web sitelerini güvenli hale getirmeye yardımcı olmak için tasarlandı, ancak site
      operatörlerinin süper çerezler yerleştirmesine izin verdiği için gizlilik endişeleri
      ortaya çıktı. Chromium tabanlı tarayıcılarda chrome://net-internals/#hsts adresini ziyaret
      ederek devre dışı bırakılabilir.

  - point: Otomatik Tarayıcı Bağlantılarını Önleyin
    priority: Optional
    details: >-
      Tarayıcınızı kullanmadığınız zamanlarda bile, kullanım etkinliği, analitik ve tanılama
      hakkında rapor vermek için eve bağlanabilir. Bunun bir kısmını ayarlar aracılığıyla
      yapılabilecek şekilde devre dışı bırakmak isteyebilirsiniz.

  - point: 1. Taraf Yalıtımını Etkinleştirin
    priority: Optional
    details: >-
      [First Party Isolation](https://awesome-privacy.xyz/security-tools/browser-extensions/first-party-isolation),
      tüm tanımlayıcı kaynaklarının ve tarayıcı durumunun URL çubuğu alan adına göre
      sınırlandırılması anlamına gelir; bu, izlemeyi büyük ölçüde azaltabilir.

  - point: URL'lerden İzleme Parametrelerini Kaldırın
    priority: Advanced
    details: >-
      Web siteleri genellikle tıkladığınız URL'lere kaynak/yönlendiren gibi bilgileri tanımlamak
      için ek GET parametreleri ekler. Bunları manuel olarak temizleyebilir veya URL'lerden
      izleme verilerini otomatik olarak temizlemek için
      [ClearURLs](https://awesome-privacy.xyz/security-tools/browser-extensions/clearurls) gibi
      bir uzantı kullanabilirsiniz.

  - point: İlk Açılış Güvenliği
    priority: Advanced
    details: >-
      Bir web tarayıcısını yükledikten sonra, ilk kez açtığınızda (gizlilik ayarlarını
      yapılandırmadan önce), çoğu tarayıcı eve bağlanır. Bu nedenle, bir tarayıcı yükledikten
      sonra önce internet bağlantınızı devre dışı bırakmalı, ardından gizlilik seçeneklerini
      yapılandırmalı ve daha sonra internet bağlantınızı yeniden etkinleştirmelisiniz.

  - point: Tor Tarayıcısını Kullanın
    priority: Advanced
    details: >-
      [Tor](https://awesome-privacy.xyz/networking/mix-networks/tor) Projesi, trafiğinizi
      şifreleyen ve birden fazla düğüm üzerinden yönlendiren bir tarayıcı sağlar; kullanıcıları
      araya girme ve izlemeden korur. Ana dezavantajları hız ve kullanıcı deneyimidir.

  - point: JavaScript'i Devre Dışı Bırakın
    priority: Advanced
    details: >-
      Birçok modern web uygulaması JavaScript tabanlıdır, bu yüzden onu devre dışı bırakmak
      tarama deneyiminizi büyük ölçüde azaltacaktır. Ancak gerçekten işi köküne kadar götürmek
      istiyorsanız, saldırı yüzeyinizi gerçekten azaltacaktır.
  softwareLinks:
    - title: Gizlilik Tarayıcıları
      url: https://github.com/Lissy93/awesome-privacy#browsers
    - title: Arama Motorları
      utl: https://github.com/Lissy93/awesome-privacy#search-engines
    - title: Tarayıcı Uzantıları
      url: https://github.com/Lissy93/awesome-privacy#browser-extensions
    - title: Tarayıcı ve Yer İmi Senkronizasyonu
      url: https://github.com/Lissy93/awesome-privacy#browser-sync
  color: emerald

