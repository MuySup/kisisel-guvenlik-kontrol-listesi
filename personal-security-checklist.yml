- title: Mobil Cihazlar
  slug: mobile-devices
  description: Cep telefonları, akıllı telefonlar ve tabletler için müdahaleci izlemeyi azaltmak
  icon: mobile
  intro: >
    Akıllı telefonlar hayatın birçok alanında devrim yarattı ve dünyayı parmaklarımızın ucuna
    getirdi. Çoğumuz için akıllı telefonlar birincil iletişim, eğlence ve bilgiye erişim aracıdır.
    Ancak yepyeni bir kolaylık seviyesi getirmelerine rağmen, ekranın arkasında dönen çirkin
    şeyler var.

    Coğrafi izleme, her hareketimizi takip etmek için kullanılır ve bu verilerin kimde olduğu
    üzerinde çok az kontrolümüz vardır — telefonunuz
    [GPS olmadan bile konumunuzu izleyebilir](https://gizmodo.com/how-to-track-a-cellphone-without-gps-or-consent-1821125371).
    Yıllar içinde ortaya çıkan sayısız rapor, telefonunuzun
    [mikrofonunun sizi dinleyebileceğini](https://www.independent.co.uk/life-style/gadgets-and-tech/news/smartphone-apps-listening-privacy-alphonso-shazam-advertising-pool-3d-honey-quest-a8139451.html)
    ve [kameranın sizi izleyebileceğini](https://www.businessinsider.com/hackers-governments-smartphone-iphone-camera-wikileaks-cybersecurity-hack-privacy-webcam-2017-6)
    ortaya koydu — hepsi bilginiz veya izniniz olmadan. Ve bir de kötü amaçlı uygulamalar, güvenlik
    yamalarının eksikliği ve olası/muhtemel arka kapılar var.

    Bir akıllı telefon kullanmak, sizinle ilgili çok fazla veri üretir — bilerek paylaştığınız
    bilgilerden, eylemlerinizden sessizce üretilen verilere kadar. Google, Microsoft, Apple ve
    Facebook'un bizim hakkımızda bildiklerini görmek korkutucu olabilir — bazen en yakın
    ailemizden bile daha fazlasını bilirler. Verilerinizin, özellikle diğer verilerle birlikte,
    ne ortaya çıkaracağını kavramak zordur.

    Bu veriler
    [sadece reklamcılıktan çok daha fazlası için](https://internethealthreport.org/2018/the-good-the-bad-and-the-ugly-sides-of-data-tracking/)
    kullanılır — daha sık olarak finans, sigorta ve istihdam için insanları derecelendirmek
    amacıyla kullanılır. Hedefli reklamlar hatta ince taneli gözetim için bile kullanılabilir
    (bkz. [ADINT](https://adint.cs.washington.edu))

    Daha fazlamız
    [hükümetlerin akıllı telefon verilerimizi nasıl topladığı ve kullandığından](https://www.statista.com/statistics/373916/global-opinion-online-monitoring-government/)
    endişe duyuyor ve haklı olarak, federal kurumlar sıklıkla
    [verilerimizi Google'dan](https://www.statista.com/statistics/273501/global-data-requests-from-google-by-federal-agencies-and-governments/),
    [Facebook'tan](https://www.statista.com/statistics/287845/global-data-requests-from-facebook-by-federal-agencies-and-governments/),
    Apple, Microsoft, Amazon ve diğer teknoloji şirketlerinden talep ediyor. Bazen talepler toplu
    olarak yapılır ve belirli bir coğrafi çit içindeki herkes hakkında ayrıntılı bilgi döndürür,
    [genellikle masum insanlar için de](https://www.nytimes.com/interactive/2019/04/13/us/google-location-tracking-police.html).
    Ve bu, dünya çapındaki istihbarat kurumlarının engelsiz erişime sahip olduğu tüm internet
    trafiğini kapsamıyor bile.
  checklist:
  - point: Cihazınızı Şifreleyin
    priority: Essential
    details: >-
      Verilerinizi fiziksel erişimden korumak için dosya şifreleme kullanın. Bu, cihazınız
      kaybolur veya çalınırsa kimsenin verilerinize erişemeyeceği anlamına gelir.

  - point: Kullanılmayan Bağlantı Özelliklerini Kapatın
    priority: Essential
    details: >-
      WiFi, Bluetooth, NFC vb. kullanmadığınızda, bu özellikleri kapatın. Bu özellikleri
      kullanan birkaç yaygın tehdit vardır.

  - point: Uygulama Sayısını Asgari Düzeyde Tutun
    priority: Essential
    details: >-
      İhtiyacınız olmayan veya düzenli olarak kullanmadığınız uygulamaları kaldırın. Uygulamalar
      genellikle arka planda çalışarak cihazınızı yavaşlattığı gibi veri de toplar.

  - point: Uygulama İzinleri
    priority: Essential
    details: >-
      Uygulamalara ihtiyaç duymadıkları izinleri vermeyin. Android için,
      [Bouncer](https://awesome-privacy.xyz/security-tools/mobile-apps/bouncer) geçici/tek seferlik
      izinler vermenize olanak tanıyan bir uygulamadır.

  - point: Yalnızca Resmi Kaynaktan Uygulama Yükleyin
    priority: Essential
    details: >-
      Apple App Store ve Google Play Store'daki uygulamalar taranır ve kriptografik olarak
      imzalanır, bu da onların kötü amaçlı olma olasılığını azaltır.

  - point: Telefon Şarj Etme Tehditlerine Dikkat Edin
    priority: Optional
    details: >-
      Juice Jacking, bilgisayar korsanlarının akıllı telefonunuza veya tabletinize kötü amaçlı
      yazılım yüklemek için ele geçirilmiş bir USB portu aracılığıyla halka açık şarj istasyonlarını
      kullanmasıdır.

  - point: Bir Mobil Operatör PIN'i Ayarlayın
    priority: Essential
    details: >-
      SIM ele geçirme, bir bilgisayar korsanının mobil numaranızı kendi SIM'ine aktarabilmesidir.
      Buna karşı korunmanın en kolay yolu, mobil sağlayıcınız aracılığıyla bir PIN ayarlamaktır.

  - point: Arayan Kimliği Listelerinden Çıkın
    priority: Optional
    details: >-
      Bilgilerinizi gizli tutmak için, numaranızı TrueCaller, CallApp, SyncMe ve Hiya gibi arayan
      kimliği uygulamalarından çıkarabilirsiniz.

  - point: Çevrimdışı Haritalar Kullanın
    priority: Optional
    details: >-
      Harita uygulamalarından veri sızıntılarını azaltmak için OsmAnd veya Organic Maps gibi
      çevrimdışı bir harita uygulaması kullanmayı düşünün.

  - point: Kişiselleştirilmiş Reklamları Devre Dışı Bırakın
    priority: Optional
    details: >-
      Kişiselleştirilmiş reklamları görmekten çıkarak toplanan veri miktarını biraz azaltabilirsiniz.

  - point: Çok Fazla Giriş Denemesinden Sonra Sil
    priority: Optional
    details: >-
      Bir saldırganın PIN'inizi kaba kuvvetle kırmasına karşı korunmak için, cihazınızı çok
      sayıda başarısız giriş denemesinden sonra silinecek şekilde ayarlayın.

  - point: İzleyicileri İzleyin
    priority: Optional
    details: >-
      [εxodus](https://awesome-privacy.xyz/security-tools/online-tools/εxodus), herhangi bir
      uygulamayı arayıp içine hangi izleyicilerin gömülü olduğunu görmenizi sağlayan harika
      bir hizmettir.

  - point: Mobil Güvenlik Duvarı Kullanın
    priority: Optional
    details: >-
      Uygulamaların gizliliğe duyarlı verileri sızdırmasını önlemek için bir güvenlik duvarı
      uygulaması yükleyebilirsiniz.

  - point: Arka Plan Etkinliğini Azaltın
    priority: Optional
    details: >-
      Android için SuperFreeze, uygulama başına tüm arka plan etkinliklerini tamamen dondurmayı
      mümkün kılar.

  - point: Mobil Uygulamaları Sanal Ortama (Sandbox) Alın
    priority: Optional
    details: >-
      İzin düşkünü uygulamaların özel verilerinize erişmesini bir sanal ortam olan
      [Island](https://awesome-privacy.xyz/security-tools/mobile-apps/island) ile engelleyin.

  - point: Tor Trafiği
    priority: Advanced
    details: >-
      [Orbot](https://awesome-privacy.xyz/security-tools/mobile-apps/orbot), sizi gözetim ve
      herkese açık WiFi tehditlerinden korumaya yardımcı olacak sistem genelinde bir Tor
      bağlantısı sağlar.

  - point: Özel Sanal Klavyelerden Kaçının
    priority: Optional
    details: >-
      Cihazınızın standart klavyesine bağlı kalmanız önerilir. 3. taraf bir klavye uygulaması
      kullanmayı seçerseniz, saygın olduğundan emin olun.

  - point: Cihazınızı Düzenli Olarak Yeniden Başlatın
    priority: Optional
    details: >-
      Telefonunuzu haftada en az bir kez yeniden başlatmak, bellekte önbelleğe alınan uygulama
      durumunu temizler ve yeniden başlatmadan sonra daha sorunsuz çalışabilir.

  - point: SMS'ten Kaçının
    priority: Optional
    details: >-
      2FA kodları almak veya iletişim kurmak için SMS kullanılmamalıdır, bunun yerine
      [Signal](https://awesome-privacy.xyz/communication/encrypted-messaging/signal) gibi
      şifreli bir mesajlaşma uygulaması kullanın.

  - point: Numaranızı Gizli Tutun
    priority: Optional
    details: >-
      [MySudo](https://awesome-privacy.xyz/finance/virtual-credit-cards/mysudo), farklı kişiler
      veya gruplar için sanal telefon numaraları oluşturmanıza ve kullanmanıza olanak tanır. Bu,
      bölümlendirme için harikadır.

  - point: Stalkerware'e Dikkat Edin
    priority: Optional
    details: >-
      Stalkerware, tanıdığınız biri tarafından doğrudan cihazınıza yüklenen kötü amaçlı yazılımdır.
      Ondan kurtulmanın en iyi yolu bir fabrika ayarlarına sıfırlamadır.

  - point: Özel Uygulama Yerine Tarayıcıyı Tercih Edin
    priority: Optional
    details: >-
      Mümkün olduğunda, özel uygulamalar yüklemek yerine sitelere erişmek için güvenli bir
      tarayıcı kullanmayı düşünün.

  - point: Özel Bir ROM Çalıştırmayı Düşünün (Android)
    priority: Advanced
    details: >-
      Cihaz üreticinizin çok fazla kişisel bilgi topladığından endişe ediyorsanız, gizlilik
      odaklı özel bir ROM düşünün.
